                    <div className="score-fill" style={{width:`${securityScore}%`,background:securityScore>60?"linear-gradient(90deg,#5BAA5B,#7DC97D)":securityScore>30?"linear-gradient(90deg,#E8B86D,#F4D090)":"linear-gradient(90deg,#D4735A,#F0957A)"}} />
                  </div>
                </div>
                <div style={{fontFamily:"var(--font-serif)",fontSize:"1.6rem",color:securityScore>60?"var(--green)":securityScore>30?"var(--gold)":"var(--red)",minWidth:48,textAlign:"right"}}>{securityScore}%</div>
              </div>

              <div className={stepDir>=0?"slide-in":"slide-back"} key={`step-${step}`}>

              {/* ── STEP 1 ── */}
              {step===1&&(
                <FormSection title="01 — Dados da Empresa" icon="🏢">
                  <Row2>
                    <Field label="Razão Social *" error={errors.businessName}>
                      <input className={`inp${errors.businessName?" err":""}`} value={formData.businessName} onChange={e=>set("businessName",e.target.value)} placeholder="Nome conforme CNPJ" />
                    </Field>
                    <Field label="Nome Fantasia">
                      <input className="inp" value={formData.tradeName} onChange={e=>set("tradeName",e.target.value)} placeholder="Como aparecerá na plataforma" />
                    </Field>
                  </Row2>
                  <Field label="CNPJ *" error={errors.cnpj||errors.cnpjVerified||cnpjError}>
                    <div style={{display:"flex",gap:8}}>
                      <input className={`inp${(errors.cnpj||errors.cnpjVerified||cnpjError)?" err":""}`} value={formData.cnpj} onChange={e=>{set("cnpj",fmtCNPJ(e.target.value));setCnpjError("");setCnpjData(null);setCnpjSugg([]);}} placeholder="00.000.000/0000-00" style={{flex:1}} inputMode="numeric" />
                      <button className="btn" onClick={verifyCNPJ} disabled={verifyingCNPJ||formData.cnpjVerified} style={{
                        padding:"0 16px",borderRadius:8,fontSize:".75rem",letterSpacing:"1px",whiteSpace:"nowrap",fontFamily:"var(--font-sans)",
                        background:formData.cnpjVerified?"#5BAA5B15":verifyingCNPJ?"var(--stone)":"var(--ink)",
                        color:formData.cnpjVerified?"var(--green)":verifyingCNPJ?"var(--muted)":"#F7F5F0",
                        border:`1px solid ${formData.cnpjVerified?"#5BAA5B":"transparent"}`,
                        display:"flex",alignItems:"center",gap:6,
                      }}>
                        {verifyingCNPJ&&<span className="spinner" style={{borderTopColor:"var(--muted)"}} />}
                        {formData.cnpjVerified?"✓ Verificado":verifyingCNPJ?"Consultando...":"Verificar CNPJ"}
                      </button>
                    </div>
                    {verifyingCNPJ&&(
                      <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
                        <div className="skeleton" style={{height:14,width:"70%"}} />
                        <div className="skeleton" style={{height:14,width:"50%"}} />
                      </div>
                    )}
                    {cnpjData&&formData.cnpjVerified&&(
                      <div style={{marginTop:8,background:"#5BAA5B0D",border:"1px solid #5BAA5B30",borderRadius:8,padding:"10px 14px",animation:"fadeUp .3s ease"}}>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--green)",fontWeight:600,marginBottom:4}}>✓ CNPJ ativo — Receita Federal</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted2)",lineHeight:1.6}}>
                          {cnpjData.razao_social&&<div><strong>Razão Social:</strong> {cnpjData.razao_social}</div>}
                          {cnpjData.municipio?.descricao&&<div><strong>Município:</strong> {cnpjData.municipio.descricao} / {cnpjData.municipio.uf}</div>}
                          {cnpjData.cnae_fiscal_principal?.descricao&&<div><strong>CNAE:</strong> {cnpjData.cnae_fiscal_principal.descricao}</div>}
                        </div>
                        {/* Sugestões de serviço pelo CNAE (melhoria 3.3) */}
                        {cnpjSuggestions.length>0&&(
                          <div style={{marginTop:8,borderTop:"1px solid #5BAA5B20",paddingTop:8}}>
                            <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--green)",marginBottom:6}}>💡 Serviços sugeridos pelo CNAE:</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                              {cnpjSuggestions.map(s=><span key={s} style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"var(--green)",border:"1px solid #5BAA5B30"}}>{s}</span>)}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                    {cnpjError&&<Hint>{cnpjError}</Hint>}
                  </Field>
                  <Row2>
                    <Field label="E-mail Empresarial *" error={errors.email}>
                      <input className={`inp${errors.email?" err":formData.email&&validateEmail(formData.email)?" ok":""}`} value={formData.email} onChange={e=>set("email",e.target.value)} placeholder="contato@empresa.com.br" type="email" />
                    </Field>
                    <Field label="Telefone *" error={errors.phone}>
                      <input className={`inp${errors.phone?" err":""}`} value={formData.phone} onChange={e=>set("phone",fmtPhone(e.target.value))} placeholder="(11) 99999-0000" inputMode="tel" />
                    </Field>
                  </Row2>
                  <Row2>
                    <Field label="WhatsApp"><input className="inp" value={formData.whatsapp} onChange={e=>set("whatsapp",fmtPhone(e.target.value))} placeholder="(11) 99999-0000" inputMode="tel" /></Field>
                    <Field label="Instagram">
                      <div style={{position:"relative"}}>
                        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontFamily:"var(--font-sans)",fontSize:".85rem",color:"var(--muted)"}}>@</span>
                        <input className="inp" style={{paddingLeft:28}} value={formData.instagram} onChange={e=>set("instagram",e.target.value)} placeholder="seunegocio" />
                      </div>
                    </Field>
                  </Row2>
                  <Field label="Descrição do Negócio">
                    <textarea className="inp" rows={3} value={formData.description} onChange={e=>set("description",e.target.value)} placeholder="Descreva seus serviços, especialidades e diferenciais..." />
                  </Field>
                  <Row2>
                    <Field label="Logo"><ImageUpload preview={logoPreview} onChange={e=>handleImageUpload(e,setLogoPreview)} label="PNG/JPG · máx 5MB" /></Field>
                    <Field label="Foto de Capa"><ImageUpload preview={coverPreview} onChange={e=>handleImageUpload(e,setCoverPreview)} label="Foto principal · 16:9" /></Field>
                  </Row2>
                </FormSection>
              )}

              {/* ── STEP 2 ── */}
              {step===2&&(
                <FormSection title="02 — Endereço" icon="📍">
                  <Hint>O CEP preenche o endereço automaticamente via ViaCEP.</Hint>
                  <Row2>
                    <Field label="CEP *" error={errors.cep}><input className={`inp${errors.cep?" err":""}`} value={formData.cep} onChange={e=>set("cep",fmtCEP(e.target.value))} placeholder="00000-000" inputMode="numeric" /></Field>
                    <Field label="Estado *" error={errors.state}>
                      <select className={`inp${errors.state?" err":""}`} value={formData.state} onChange={e=>set("state",e.target.value)}>
                        <option value="">Selecione</option>{STATES_BR.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </Field>
                  </Row2>
                  <Field label="Logradouro *" error={errors.street}><input className={`inp${errors.street?" err":""}`} value={formData.street} onChange={e=>set("street",e.target.value)} placeholder="Rua, Avenida..." /></Field>
                  <Row2>
                    <Field label="Número *" error={errors.number}><input className={`inp${errors.number?" err":""}`} value={formData.number} onChange={e=>set("number",e.target.value)} placeholder="123" inputMode="numeric" /></Field>
                    <Field label="Complemento"><input className="inp" value={formData.complement} onChange={e=>set("complement",e.target.value)} placeholder="Sala, Loja..." /></Field>
                  </Row2>
                  <Row2>
                    <Field label="Bairro"><input className="inp" value={formData.neighborhood} onChange={e=>set("neighborhood",e.target.value)} placeholder="Bairro" /></Field>
                    <Field label="Cidade *" error={errors.city}><input className={`inp${errors.city?" err":""}`} value={formData.city} onChange={e=>set("city",e.target.value)} placeholder="Cidade" /></Field>
                  </Row2>
                  {/* Upload real para Storage (melhoria 1.2) */}
                  <Field label="Comprovante de Endereço">
                    <DocUpload fieldName="addressProof" userId={authUser?.uid} uploadedUrl={formData.addressProofUrl}
                      onUploaded={url=>set("addressProofUrl",url)}
                      onError={msg=>showToast(msg,"error")}
                      label="Conta de luz, água ou telefone · PDF/JPG/PNG" />
                  </Field>
                </FormSection>
              )}

              {/* ── STEP 3 ── */}
              {step===3&&(
                <FormSection title="03 — Responsável Legal" icon="👤">
                  <div style={{background:"#FFF8ED",border:"1px solid #F0D99A",borderRadius:10,padding:"14px 16px",marginBottom:8,display:"flex",gap:10}}>
                    <span>⚠️</span>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".75rem",color:"#7A6020",lineHeight:1.6}}>Dados usados <strong>exclusivamente para verificação</strong> — nunca exibidos publicamente.</div>

                  <Row2>
                    <Field label="Nome Completo *" error={errors.ownerName}><input className={`inp${errors.ownerName?" err":""}`} value={formData.ownerName} onChange={e=>set("ownerName",e.target.value)} placeholder="Nome conforme RG/CNH" /></Field>
                    <Field label="CPF" error={errors.ownerCPF}><input className={`inp${errors.ownerCPF?" err":""}`} value={formData.ownerCPF} onChange={e=>set("ownerCPF",fmtCPF(e.target.value))} placeholder="000.000.000-00" inputMode="numeric" /></Field>
                  </Row2>
                  <Row2>
                    <Field label="E-mail *" error={errors.ownerEmail}><input className={`inp${errors.ownerEmail?" err":""}`} value={formData.ownerEmail} onChange={e=>set("ownerEmail",e.target.value)} placeholder="responsavel@email.com" type="email" /></Field>
                    <Field label="Telefone Pessoal"><input className="inp" value={formData.ownerPhone} onChange={e=>set("ownerPhone",fmtPhone(e.target.value))} placeholder="(11) 99999-0000" inputMode="tel" /></Field>
                  </Row2>
                  <Field label="Documento de Identificação">
                    <DocUpload fieldName="ownerDoc" userId={authUser?.uid} uploadedUrl={formData.ownerDocUrl}
                      onUploaded={url=>set("ownerDocUrl",url)}
                      onError={msg=>showToast(msg,"error")}
                      label="RG, CNH ou Passaporte · PDF/JPG/PNG" />
                  </Field>
                  <Field label="Cartão CNPJ">
                    <DocUpload fieldName="cnpjDoc" userId={authUser?.uid} uploadedUrl={formData.cnpjDocUrl}
                      onUploaded={url=>set("cnpjDocUrl",url)}
                      onError={msg=>showToast(msg,"error")}
                      label="Cartão CNPJ da Receita Federal · PDF/JPG" />
                  </Field>
                </FormSection>
              )}

              {/* ── STEP 4 ── */}
              {step===4&&(
                <FormSection title="04 — Verificação de Contato" icon="📱">
                  <Hint>Código de 6 dígitos. Configure EmailJS ou Cloud Functions para envio real.</Hint>
                  {/* Email */}
                  <div style={{background:"#fff",border:"1px solid var(--stone)",borderRadius:12,padding:"20px",marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".8rem",fontWeight:500}}>📧 E-mail</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",marginTop:2}}>{formData.email||"—"}</div>
                      </div>
                      {formData.emailVerified
                        ?<span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--green)",background:"#5BAA5B15",padding:"4px 12px",borderRadius:20,border:"1px solid #5BAA5B40"}}>✓ Verificado</span>
                        :<button className="btn" onClick={()=>sendVerification("email")} disabled={sendingCode||!formData.email} style={{padding:"6px 14px",borderRadius:6,background:"var(--ink)",color:"#F7F5F0",fontFamily:"var(--font-sans)",fontSize:".72rem",display:"flex",alignItems:"center"}}>
                          {sendingCode&&<span className="spinner" />}Enviar código
                        </button>}
                    </div>
                    {!formData.emailVerified&&(
                      <div style={{display:"flex",gap:8}}>
                        <input className="inp" value={formData.emailCode} onChange={e=>set("emailCode",e.target.value)} placeholder="000000" style={{flex:1,letterSpacing:"4px",fontSize:"1.1rem",textAlign:"center"}} maxLength={6} inputMode="numeric" />
                        <button className="btn" onClick={()=>checkCode("email")} style={{padding:"0 16px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem"}}>Confirmar</button>
                      </div>
                    )}
                    {errors.emailVerified&&<div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--red)",marginTop:6}}>{errors.emailVerified}</div>}
                  </div>
                  {/* Phone */}
                  <div style={{background:"#fff",border:"1px solid var(--stone)",borderRadius:12,padding:"20px",marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".8rem",fontWeight:500}}>📱 Telefone</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",marginTop:2}}>{formData.phone||"—"}</div>
                      </div>
                      {formData.phoneVerified
                        ?<span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--green)",background:"#5BAA5B15",padding:"4px 12px",borderRadius:20,border:"1px solid #5BAA5B40"}}>✓ Verificado</span>
                        :<button className="btn" onClick={()=>sendVerification("phone")} disabled={sendingCode||!formData.phone} style={{padding:"6px 14px",borderRadius:6,background:"var(--ink)",color:"#F7F5F0",fontFamily:"var(--font-sans)",fontSize:".72rem",display:"flex",alignItems:"center"}}>
                          {sendingCode&&<span className="spinner" />}Enviar código
                        </button>}
                    </div>
                    {!formData.phoneVerified&&(
                      <div style={{display:"flex",gap:8}}>
                        <input className="inp" value={formData.phoneCode} onChange={e=>set("phoneCode",e.target.value)} placeholder="000000" style={{flex:1,letterSpacing:"4px",fontSize:"1.1rem",textAlign:"center"}} maxLength={6} inputMode="numeric" />
                        <button className="btn" onClick={()=>checkCode("phone")} style={{padding:"0 16px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem"}}>Confirmar</button>
                      </div>
                    )}
                    {errors.phoneVerified&&<div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--red)",marginTop:6}}>{errors.phoneVerified}</div>}
                  </div>
                  {/* Checklist */}
                  <div style={{background:"var(--cream)",border:"1px solid var(--stone)",borderRadius:12,padding:"16px 20px"}}>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:12}}>CHECKLIST DE SEGURANÇA</div>
                    {FRAUD_RULES.map(r=>{
                      const done=(r.id==="cnpj"&&formData.cnpjVerified)||(r.id==="tel"&&formData.phoneVerified)||(r.id==="email"&&formData.emailVerified)||(r.id==="doc"&&(formData.ownerDoc||formData.ownerDocUrl))||(r.id==="addr"&&(formData.addressProof||formData.addressProofUrl));
                      return(
                        <div key={r.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,transition:"all .3s"}}>
                          <div style={{width:20,height:20,borderRadius:"50%",background:done?"#5BAA5B15":"#EDE9E2",border:`1px solid ${done?"#5BAA5B":"#DDD8CE"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .3s"}}>
                            {done?<span style={{color:"var(--green)",fontSize:".7rem"}}>✓</span>:<span style={{color:"#C8BBA8",fontSize:".7rem"}}>○</span>}
                          </div>
                          <div>
                            <div style={{fontFamily:"var(--font-sans)",fontSize:".75rem",color:done?"var(--ink)":"var(--muted)",fontWeight:done?500:400,transition:"all .3s"}}>{r.label}</div>
                            <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)"}}>{r.desc}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </FormSection>
              )}

              {/* ── STEP 5 ── */}
              {step===5&&(
                <FormSection title="05 — Acesso e Termos" icon="🔐">
                  <Row2>
                    <Field label="Senha *" error={errors.password}>
                      <div className="pass-wrap">
                        <input className={`inp${errors.password?" err":""}`} type={showPass?"text":"password"} value={formData.password} onChange={e=>set("password",e.target.value)} placeholder="Mín. 8 · maiúscula · número" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowPass(p=>!p)}>{showPass?"🙈":"👁️"}</span>
                      </div>
                      {formData.password&&(
                        <div style={{marginTop:6}}>
                          <div style={{height:3,background:"#DDD8CE",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:`${pwStrength.score}%`,background:pwStrength.color,transition:"all .4s ease"}} /></div>
                          <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:pwStrength.color,marginTop:3}}>{pwStrength.label}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                            {[{ok:formData.password.length>=8,label:"8+ chars"},{ok:/[A-Z]/.test(formData.password),label:"Maiúscula"},{ok:/[0-9]/.test(formData.password),label:"Número"},{ok:/[^A-Za-z0-9]/.test(formData.password),label:"Símbolo"}].map(r=>(
                              <span key={r.label} style={{fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".6rem",padding:"2px 7px",borderRadius:10,background:r.ok?"#5BAA5B15":"#F0EDE8",color:r.ok?"#5BAA5B":"#9A9288",border:`1px solid ${r.ok?"#5BAA5B40":"#DDD8CE"}`,transition:"all .25s"}}>
                                {r.ok?"✓ ":""}{r.label}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </Field>
                    <Field label="Confirmar Senha *" error={errors.confirmPassword}>
                      <div className="pass-wrap">
                        <input className={`inp${errors.confirmPassword?" err":""}`} type={showCPass?"text":"password"} value={formData.confirmPassword} onChange={e=>set("confirmPassword",e.target.value)} placeholder="Repita a senha" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowCPass(p=>!p)}>{showCPass?"🙈":"👁️"}</span>
                      </div>
                      {formData.confirmPassword&&formData.password===formData.confirmPassword&&<div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--green)",marginTop:4}}>✓ Senhas coincidem</div>}
                    </Field>
                  </Row2>
                  <div style={{background:"var(--cream)",border:"1px solid var(--stone)",borderRadius:12,padding:"16px 20px",marginBottom:20}}>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:14}}>DADOS BANCÁRIOS</div>
                    <Row2>
                      <Field label="Banco"><input className="inp" value={formData.bankName} onChange={e=>set("bankName",e.target.value)} placeholder="Nome do banco" /></Field>
                      <Field label="Chave PIX"><input className="inp" value={formData.pix} onChange={e=>set("pix",e.target.value)} placeholder="CPF, CNPJ, e-mail ou telefone" /></Field>
                    </Row2>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
                    {[
                      {key:"acceptTerms",     label:"Li e aceito os Termos de Uso",                                                     err:errors.acceptTerms},
                      {key:"acceptPrivacy",   label:"Li e aceito a Política de Privacidade (LGPD)",                                     err:errors.acceptPrivacy},
                      {key:"acceptAntiFraud", label:"Declaro que as informações são verídicas e estou ciente das penalidades por fraude",err:errors.acceptAntiFraud,warn:true},
                    ].map(t=>(
                      <div key={t.key} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                        <div className={`check-box${formData[t.key]?" on":""}`} onClick={()=>set(t.key,!formData[t.key])}>
                          {formData[t.key]&&<span style={{color:"#fff",fontSize:".7rem"}}>✓</span>}
                        </div>
                        <div>
                          <span style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:t.warn?"#7A5020":"var(--ink)",lineHeight:1.5}}>{t.label}</span>
                          {t.err&&<div style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--red)",marginTop:2}}>{t.err}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"#F0F7FF",border:"1px solid #C0D8F0",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}}>
                    <span>☁️</span>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"#2A5080",lineHeight:1.6}}>
                      Ao enviar, sua conta será criada no <strong>Firebase Authentication</strong> e seus dados e documentos salvos com segurança no <strong>Firestore + Storage</strong>.
                    </div>
                  </div>
                </FormSection>
              )}

              </div>{/* end step animation wrapper */}

              {/* Catálogo opcional */}
              {step===5&&(needsServices||needsProducts)&&(
                <div style={{marginTop:40}} className="fade-up">
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"4px",color:"var(--muted)",marginBottom:20,textAlign:"center"}}>PRÉ-CADASTRO DE CATÁLOGO (OPCIONAL)</div>
                  {needsServices&&<ServiceEditor services={services} setServices={setServices} showToast={showToast} suggestedServices={cnpjSuggestions} />}
                  {needsProducts&&<ProductEditor products={products} setProducts={setProducts} showToast={showToast} />}
                </div>
              )}

              {/* Navigation buttons */}
              <div style={{display:"flex",gap:12,marginTop:24}}>
                {step>1&&<button className="btn" onClick={prevStep} style={{flex:1,padding:"13px",borderRadius:8,background:"#fff",color:"var(--ink)",border:"1px solid var(--stone2)",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"1px"}}>← Anterior</button>}
                {step<totalSteps
                  ?<button className="btn" onClick={nextStep} style={{flex:2,padding:"13px",borderRadius:8,background:"var(--ink)",color:"#F7F5F0",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"2px",fontWeight:500}}>Próximo →</button>
                  :<button className="btn" onClick={handleSubmit} disabled={isSubmitting} style={{flex:2,padding:"13px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"2px",fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {isSubmitting&&<span className="spinner" />}
                    {isSubmitting?"Salvando no Firebase...":"ENVIAR CADASTRO ✓"}
                  </button>}
              </div>
            </div>
          )}

          {/* ══ REVIEW ════════════════════════════════════════════════════════ */}
          {screen==="review"&&(
            <div className="fade-up" style={{maxWidth:580,margin:"0 auto",padding:"64px 24px",textAlign:"center"}}>
              <div style={{fontSize:"4rem",marginBottom:24,animation:"popIn .4s ease"}}>🎉</div>
              <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"4px",color:"var(--gold)"}}>CADASTRO SALVO NO FIREBASE</span>
              <h2 style={{fontFamily:"var(--font-serif)",fontSize:"2.5rem",fontWeight:300,margin:"16px 0 12px"}}>Falta pouco!</h2>
              <p style={{fontFamily:"var(--font-sans)",fontSize:".85rem",color:"var(--muted2)",lineHeight:1.8,marginBottom:32}}>
                Seus dados foram salvos com segurança no Firebase. Nossa equipe revisará em até <strong style={{color:"var(--ink)"}}>48 horas úteis</strong>.
              </p>
              <div style={{background:"#fff",border:"1px solid var(--stone)",borderRadius:14,padding:"24px",marginBottom:24,textAlign:"left"}}>
                <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:16}}>O QUE ACONTECE AGORA</div>
                {[
                  {icon:"☁️",title:"Dados no Firestore",     desc:"Cadastro salvo e acessível de qualquer dispositivo"},
                  {icon:"📁",title:"Documentos no Storage",  desc:"Arquivos enviados com segurança para o Firebase Storage"},
                  {icon:"👀",title:"Revisão de documentos",  desc:"Equipe analisa CNPJ, documentos e endereço"},
                  {icon:"✅",title:"Aprovação e publicação", desc:"Perfil vai ao ar após aprovação"},
                ].map((s,i)=>(
                  <div key={i} className="fade-up" style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:i<3?16:0,animationDelay:`${i*.08}s`}}>
                    <div style={{width:36,height:36,borderRadius:10,background:"var(--cream)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0,border:"1px solid var(--stone)"}}>{s.icon}</div>
                    <div>
                      <div style={{fontFamily:"var(--font-sans)",fontSize:".8rem",fontWeight:500}}>{s.title}</div>
                      <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",marginTop:2}}>{s.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:"var(--cream)",border:"1px solid var(--stone)",borderRadius:10,padding:"14px",marginBottom:24,fontFamily:"var(--font-sans)",fontSize:".75rem",color:"var(--muted2)"}}>
                🔒 Protocolo: <strong style={{color:"var(--ink)",fontFamily:"monospace"}}>{protocolRef.current}</strong>
              </div>
              <button className="btn" onClick={()=>setScreen("dashboard")} style={{width:"100%",padding:"14px",borderRadius:8,background:"var(--ink)",color:"#F7F5F0",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"2px"}}>IR PARA MEU PAINEL →</button>
            </div>
          )}

          {/* ══ DASHBOARD ═════════════════════════════════════════════════════ */}
          {screen==="dashboard"&&(
            <div className="fade-up" style={{maxWidth:900,margin:"0 auto",padding:"32px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28,flexWrap:"wrap",gap:12}}>
                <div>
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"3px",color:"var(--muted)",marginBottom:4}}>PAINEL DO ESTABELECIMENTO</div>
                  <h2 style={{fontFamily:"var(--font-serif)",fontSize:"2rem",fontWeight:300}}>{formData.businessName||"Meu Negócio"}</h2>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end"}}>
                  <div style={{background:"#FFF8ED",border:"1px solid #F0D99A",borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:"#E8B86D"}} />
                    <span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"#7A6020"}}>Em análise</span>
                  </div>
                  {authUser&&<div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)"}}>☁️ Firebase: {authUser.uid.slice(0,8)}...</div>}
                </div>
              </div>
              <div style={{background:"var(--ink)",borderRadius:14,padding:"20px 24px",marginBottom:20,display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--gold)",marginBottom:8}}>PONTUAÇÃO DE SEGURANÇA</div>
                  <div className="score-bar" style={{background:"#2C2420"}}><div className="score-fill" style={{width:`${securityScore}%`,background:"linear-gradient(90deg,#C9A96E,#E8C98A)"}} /></div>
                </div>
                <div style={{fontFamily:"var(--font-serif)",fontSize:"3rem",color:"var(--gold)"}}>{securityScore}%</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
                {[
                  {label:"Serviços", val:services.length,     icon:"✂️",color:"var(--gold)"},
                  {label:"Produtos", val:products.length,     icon:"📦",color:"var(--blue)"},
                  {label:"Campos",   val:`${progress.pct}%`,  icon:"📊",color:"#5BAA5B"},
                  {label:"Status",   val:"Em análise",        icon:"⏳",color:"#E8B86D"},
                ].map((s,i)=>(
                  <div key={s.label} className="hov fade-up" style={{background:"#fff",borderRadius:12,padding:"18px",border:"1px solid var(--stone)",borderTop:`3px solid ${s.color}`,animationDelay:`${i*.07}s`}}>
                    <div style={{fontSize:"1.4rem",marginBottom:6}}>{s.icon}</div>
                    <div style={{fontFamily:"var(--font-serif)",fontSize:"1.8rem"}}>{s.val}</div>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".7rem",color:"var(--muted)",marginTop:2}}>{s.label}</div>
                  </div>
                ))}
              </div>
              {needsServices&&<ServiceEditor services={services} setServices={setServices} showToast={showToast} suggestedServices={cnpjSuggestions} />}
              {needsProducts&&<ProductEditor products={products} setProducts={setProducts} showToast={showToast} />}
            </div>
          )}
        </div>
      );
    }

    // ── Mount ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  
  </script>
</body>
</html>
