      const save=()=>{
        if(!form.name||!form.price){showToast("Nome e preço obrigatórios","error");return;}
        if(editId) setProducts(p=>p.map(pr=>pr.id===editId?{...form}:pr));
        else setProducts(p=>[...p,{...form,id:uid()}]);
        resetForm(); showToast(editId?"Produto atualizado ✓":"Produto adicionado ✓","success");
      };
      return(
        <div style={{background:"#fff",border:"1px solid var(--stone)",borderRadius:14,padding:"20px",marginBottom:20}}>
          <SectionHeader title="Produtos" icon="📦" count={products.length} onAdd={()=>{resetForm();setAdding(true);}} />
          {products.length===0&&!adding&&<EmptyState icon="📦" text="Nenhum produto ainda" sub="Adicione os produtos que você vende" />}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:adding?16:0}}>
            {products.map(p=>(
              <div key={p.id} style={{background:"var(--cream)",borderRadius:10,border:"1px solid var(--stone)",overflow:"hidden"}}>
                {p.photoPreview&&<div style={{height:80,overflow:"hidden"}}><img src={p.photoPreview} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} /></div>}
                <div style={{padding:"10px"}}>
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".78rem",fontWeight:500,marginBottom:2}}>{p.name}</div>
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)",marginBottom:8}}>{p.brand&&`${p.brand} · `}R$ {parseFloat(p.price||0).toFixed(2)}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>edit(p)} className="btn" style={{flex:1,padding:"5px",borderRadius:5,border:"1px solid var(--stone)",background:"var(--cream)",fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted2)"}}>Editar</button>
                    <button onClick={()=>remove(p.id)} className="btn" style={{flex:1,padding:"5px",borderRadius:5,border:"1px solid #F4D0C8",background:"#FFF5F3",fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--red)"}}>Remover</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {adding&&(
            <div className="fade-up" style={{background:"#fff",border:"1px solid var(--stone)",borderRadius:14,padding:"20px",marginTop:8}}>
              <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:16}}>{editId?"EDITAR":"NOVO PRODUTO"}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <Field label="Nome *"><input className="inp" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ex: Shampoo Hidra" /></Field>
                <Field label="Marca"><input className="inp" value={form.brand} onChange={e=>setForm(p=>({...p,brand:e.target.value}))} placeholder="Ex: L&apos;Oréal" /></Field>
                <Field label="Categoria">
                  <select className="inp" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                    <option value="">Selecione</option>
                    {PRODUCT_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="SKU"><input className="inp" value={form.sku} onChange={e=>setForm(p=>({...p,sku:e.target.value}))} placeholder="Código interno" /></Field>
                <Field label="Preço (R$) *"><input className="inp" type="text" value={form.price} onChange={e=>setForm(p=>({...p,price:fmtPrice(e.target.value)}))} placeholder="0,00" inputMode="decimal" /></Field>
                <Field label="Estoque"><input className="inp" type="number" min="0" value={form.stock} onChange={e=>setForm(p=>({...p,stock:e.target.value}))} placeholder="0" inputMode="numeric" /></Field>
              </div>
              <Field label="Foto">
                <div onClick={()=>fileRef.current.click()} className="drop-zone" style={{padding:"16px",height:form.photoPreview?120:70,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                  {form.photoPreview
                    ?<img src={form.photoPreview} alt="preview" style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",borderRadius:8}} />
                    :<span style={{fontFamily:"var(--font-sans)",fontSize:".75rem",color:"var(--muted)"}}>📷 Clique para adicionar foto</span>
                  }
                </div>
                <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" onChange={handlePhoto} style={{display:"none"}} />
              </Field>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button onClick={resetForm} className="btn" style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid var(--stone2)",background:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem",color:"var(--muted2)"}}>Cancelar</button>
                <button onClick={save} className="btn" style={{flex:2,padding:"10px",borderRadius:8,background:"var(--blue)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem",letterSpacing:"1px"}}>SALVAR</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 9. ADMIN PANEL (melhoria 4.2)
    // ════════════════════════════════════════════════════════════════════════════
    const STATUS_META = {
      pending_review:{ label:"Aguardando", color:"#C9A96E", bg:"#FFF8ED" },
      approved:      { label:"Aprovado",   color:"#5BAA5B", bg:"#F0FFF0" },
      rejected:      { label:"Rejeitado",  color:"#D4735A", bg:"#FFF5F3" },
      blocked:       { label:"Bloqueado",  color:"#9A3030", bg:"#FFF0F0" },
    };

    function AdminPanel({onBack, currentUser}){
      const [isAdmin,  setIsAdmin]  = useState(null); // null=checking, true/false
      const [filter,  setFilter]  = useState("pending_review");
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [sel,     setSel]     = useState(null);
      const [note,    setNote]    = useState("");
      const [busy,    setBusy]    = useState(false);
      const [counts,  setCounts]  = useState({});
      const [toast,   setToast]   = useState(null);

      const toast2 = (msg,type="info")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

      // Verifica se usuário é admin na coleção Firestore (melhoria 4.2)
      useEffect(()=>{
        if (!currentUser) { setIsAdmin(false); return; }
        db.collection("admins").doc(currentUser.uid).get()
          .then(snap=>setIsAdmin(snap.exists))
          .catch(()=>setIsAdmin(false));
      },[currentUser]);

      // Enquanto verifica, mostra loading
      if (isAdmin === null) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F8F6F2"}}>
          <div style={{width:32,height:32,border:"3px solid #EDE9E2",borderTopColor:"#C9A96E",borderRadius:"50%",animation:"spin .7s linear infinite"}} />
        </div>
      );

      // Se não é admin, nega acesso
      if (isAdmin === false) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F8F6F2",gap:16,textAlign:"center",padding:24}}>
          <div style={{fontSize:"3rem"}}>🔒</div>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.6rem",color:"#1A1715"}}>Acesso negado</div>
          <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".82rem",color:"#9A9288",maxWidth:320}}>Sua conta não tem permissão de administrador. Entre em contato com o suporte.</div>
          <button onClick={onBack} className="btn" style={{padding:"10px 24px",borderRadius:8,background:"#1A1715",color:"#fff",fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".78rem",marginTop:8}}>← Voltar</button>
        </div>
      );

      useEffect(()=>{
        setLoading(true);
        const unsub = db.collection("establishments")
          .where("status","==",filter)
          .onSnapshot(snap=>{
            // Ordenação client-side para evitar exigir índice composto no Firestore
            const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
            docs.sort((a,b)=>{
              const ta = a.createdAt?.toMillis?.() ?? 0;
              const tb = b.createdAt?.toMillis?.() ?? 0;
              return tb - ta;
            });
            setItems(docs);
            setLoading(false);
          },()=>setLoading(false));
        return unsub;
      },[filter]);

      useEffect(()=>{
        const unsubs = Object.keys(STATUS_META).map(s=>{
          return db.collection("establishments").where("status","==",s)
            .onSnapshot(snap=>setCounts(p=>({...p,[s]:snap.size})));
        });
        return ()=>unsubs.forEach(u=>u());
      },[]);

      const doAction = async(newStatus)=>{
        if(!sel)return; setBusy(true);
        try {
          await db.collection("establishments").doc(sel.id).update({
            status:newStatus, rejectReason:note||null,
            reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),
          });
          toast2(`${sel.businessName} → ${STATUS_META[newStatus].label}`,"success");
          setSel(null); setNote("");
        } catch { toast2("Erro ao atualizar","error"); } finally { setBusy(false); }
      };

      return (
        <div style={{display:"flex",minHeight:"100vh",background:"var(--cream)"}}>
          {/* Sidebar */}
          <aside style={{width:220,background:"#fff",borderRight:"1px solid var(--stone)",padding:"24px 16px",position:"sticky",top:0,height:"100vh",overflowY:"auto",flexShrink:0}}>
            <div style={{fontFamily:"var(--font-serif)",fontSize:"1.3rem",display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              beleza<em style={{color:"var(--gold)"}}>.</em>hub
              <span style={{fontFamily:"var(--font-sans)",fontSize:".55rem",letterSpacing:"2px",background:"var(--ink)",color:"var(--gold)",padding:"2px 7px",borderRadius:4}}>ADMIN</span>
            </div>
            <button onClick={onBack} className="btn" style={{marginBottom:24,fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted)",background:"transparent",padding:"4px 0"}}>← Voltar</button>
            {Object.entries(STATUS_META).map(([s,m])=>(
              <button key={s} onClick={()=>{setFilter(s);setSel(null);}} className="btn" style={{
                width:"100%",padding:"10px 12px",borderRadius:8,
                display:"flex",alignItems:"center",gap:8,fontFamily:"var(--font-sans)",fontSize:".78rem",
                background:filter===s?"var(--cream)":"transparent",color:"var(--ink)",
                marginBottom:4,textAlign:"left",
                borderLeft:`3px solid ${filter===s?m.color:"transparent"}`,
              }}>
                <span style={{flex:1}}>{m.label}</span>
                <span style={{fontSize:".65rem",padding:"2px 8px",borderRadius:10,background:m.bg,color:m.color,fontWeight:600}}>{counts[s]??"—"}</span>
              </button>
            ))}
          </aside>

          {/* List */}
          <main style={{flex:1,padding:"32px",minWidth:0}}>
            <h1 style={{fontFamily:"var(--font-serif)",fontSize:"1.8rem",fontWeight:300,marginBottom:24,display:"flex",alignItems:"center",gap:10}}>
              {STATUS_META[filter].label}
              <span style={{fontSize:".65rem",padding:"3px 10px",borderRadius:10,background:STATUS_META[filter].bg,color:STATUS_META[filter].color,fontWeight:600}}>{counts[filter]??0}</span>
            </h1>
            {loading?<div style={{textAlign:"center",padding:60}}><div style={{width:32,height:32,border:"3px solid #EDE9E2",borderTopColor:"#C9A96E",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto"}} /></div>
            :items.length===0?<div style={{textAlign:"center",padding:"60px 24px",color:"var(--muted)"}}>
                <div style={{fontSize:"2.5rem",marginBottom:12}}>📭</div>
                <div style={{fontFamily:"var(--font-serif)",fontSize:"1.2rem"}}>Nenhum cadastro {STATUS_META[filter].label.toLowerCase()}</div>
              </div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {items.map(item=>(
                <div key={item.id} onClick={()=>setSel(s=>s?.id===item.id?null:item)} style={{
                  background:sel?.id===item.id?"var(--gold-bg)":"#fff",
                  border:`1px solid ${sel?.id===item.id?"#C9A96E":"#EDE9E2"}`,
                  borderRadius:12,padding:"16px 20px",cursor:"pointer",transition:"all .18s",
                  boxShadow:sel?.id===item.id?"0 0 0 3px rgba(201,169,110,.15)":"none",
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontFamily:"var(--font-serif)",fontSize:"1.1rem",marginBottom:2}}>{item.businessName||"—"}</div>
                      <div style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted)"}}>{item.cnpj} · {item.city}/{item.state}</div>
                    </div>
                    <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",padding:"3px 10px",borderRadius:12,background:STATUS_META[item.status]?.bg,color:STATUS_META[item.status]?.color,fontWeight:600,whiteSpace:"nowrap"}}>
                      {STATUS_META[item.status]?.label}
                    </span>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    {item.cnpjVerified&&<span style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"var(--green)",border:"1px solid #5BAA5B30"}}>CNPJ ✓</span>}
                    {item.emailVerified&&<span style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"var(--green)",border:"1px solid #5BAA5B30"}}>E-mail ✓</span>}
                    {item.phoneVerified&&<span style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"var(--green)",border:"1px solid #5BAA5B30"}}>Tel ✓</span>}
                    {item.ownerDocUrl&&<span style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"var(--green)",border:"1px solid #5BAA5B30"}}>Doc ✓</span>}
                  </div>
                </div>
              ))}
            </div>}
          </main>

          {/* Detail panel */}
          {sel&&(
            <aside style={{width:340,background:"#fff",borderLeft:"1px solid var(--stone)",padding:"24px",position:"sticky",top:0,height:"100vh",overflowY:"auto",flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <h2 style={{fontFamily:"var(--font-serif)",fontSize:"1.2rem",fontWeight:400,flex:1,marginRight:8}}>{sel.businessName}</h2>
                <button onClick={()=>setSel(null)} className="btn" style={{background:"transparent",border:"1px solid var(--stone)",borderRadius:6,padding:"4px 10px",color:"var(--muted)",fontSize:".8rem"}}>✕</button>
              </div>
              {[
                {t:"Empresa",rows:[["CNPJ",sel.cnpj],["E-mail",sel.email],["Telefone",sel.phone],["CNPJ ✓",sel.cnpjVerified?"✅ Sim":"❌ Não"],["E-mail ✓",sel.emailVerified?"✅ Sim":"❌ Não"],["Telefone ✓",sel.phoneVerified?"✅ Sim":"❌ Não"]]},
                {t:"Endereço",rows:[["CEP",sel.cep],["Rua",`${sel.street||""}, ${sel.number||""}`],["Cidade",`${sel.city||""}/${sel.state||""}`]]},
                {t:"Responsável",rows:[["Nome",sel.ownerName],["CPF",sel.ownerCPF],["E-mail",sel.ownerEmail]]},
              ].map(({t,rows})=>(
                <div key={t} style={{marginBottom:16}}>
                  <div style={{fontFamily:"var(--font-sans)",fontSize:".6rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:6}}>{t.toUpperCase()}</div>
                  <div style={{background:"var(--cream)",borderRadius:8,padding:"10px 14px"}}>
                    {rows.map(([l,v])=>(
                      <div key={l} style={{display:"flex",gap:8,fontFamily:"var(--font-sans)",fontSize:".72rem",marginBottom:3}}>
                        <span style={{color:"var(--muted)",minWidth:80}}>{l}</span>
                        <span style={{wordBreak:"break-all"}}>{v||"—"}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {/* Documentos */}
              <div style={{marginBottom:16}}>
                <div style={{fontFamily:"var(--font-sans)",fontSize:".6rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:6}}>DOCUMENTOS</div>
                {[["ownerDocUrl","Doc. Responsável"],["addressProofUrl","Comp. Endereço"],["cnpjDocUrl","Cartão CNPJ"]].map(([field,label])=>(
                  sel[field]
                    ?<a key={field} href={sel[field]} target="_blank" rel="noreferrer" style={{display:"block",fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--gold)",textDecoration:"none",padding:"6px 10px",background:"var(--gold-bg)",borderRadius:6,border:"1px solid #F0D99A",marginBottom:4}}>📄 {label}</a>
                    :<div key={field} style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"#B0A898",marginBottom:4}}>❌ {label} — não enviado</div>
                ))}
              </div>
              {/* Ações */}
              <label style={{display:"block",fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted)",marginBottom:6}}>Observação</label>
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Motivo da rejeição / bloqueio..." className="inp" style={{marginBottom:12,minHeight:64}} />
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {sel.status!=="approved"&&<button onClick={()=>doAction("approved")} disabled={busy} className="btn" style={{flex:1,padding:"9px",borderRadius:8,background:"var(--green)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".72rem"}}>✅ Aprovar</button>}
                {sel.status!=="rejected"&&<button onClick={()=>doAction("rejected")} disabled={busy} className="btn" style={{flex:1,padding:"9px",borderRadius:8,background:"var(--red)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".72rem"}}>❌ Rejeitar</button>}
                {sel.status!=="blocked"&&<button onClick={()=>doAction("blocked")} disabled={busy} className="btn" style={{flex:1,padding:"9px",borderRadius:8,background:"#9A3030",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".72rem"}}>🚫 Bloquear</button>}
              </div>
            </aside>
          )}

          {/* Toast admin */}
          {toast&&<div style={{position:"fixed",bottom:24,right:24,zIndex:9999,background:toast.type==="success"?"#0F2010":"#2A1210",color:toast.type==="success"?"#7DC97D":"#F4907A",padding:"12px 20px",borderRadius:10,fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".82rem",boxShadow:"0 12px 40px rgba(0,0,0,.35)",animation:"toastIn .28s ease"}}>{toast.msg}</div>}
        </div>
      );
    }



    // ════════════════════════════════════════════════════════════════════════════
    // LOGIN MODAL
    // ════════════════════════════════════════════════════════════════════════════
    function LoginModal({ onClose, showToast, onSuccess }) {
      const [email,    setEmail]    = useState("");
      const [password, setPassword] = useState("");
      const [showPw,   setShowPw]   = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [mode,     setMode]     = useState("login"); // "login" | "reset"
      const [resetSent,setResetSent]= useState(false);

      const doLogin = async () => {
        if (!email || !password) { showToast("Preencha e-mail e senha","error"); return; }
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
          showToast("Login realizado ✓","success");
          onSuccess?.();
          onClose();
        } catch(err) {
          if (err.code==="auth/user-not-found"||err.code==="auth/wrong-password"||err.code==="auth/invalid-credential")
            showToast("E-mail ou senha incorretos","error");
          else if (err.code==="auth/too-many-requests")
            showToast("Muitas tentativas. Aguarde alguns minutos.","error");
          else showToast("Erro ao fazer login","error");
        } finally { setLoading(false); }
      };

      const doReset = async () => {
        if (!email) { showToast("Digite seu e-mail primeiro","error"); return; }
        setLoading(true);
        try {
          await auth.sendPasswordResetEmail(email);
          setResetSent(true);
          showToast("E-mail de redefinição enviado ✓","success");
        } catch { showToast("Erro ao enviar e-mail","error"); }
        finally { setLoading(false); }
      };

      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(26,23,21,.7)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} className="fade-up" style={{background:"#fff",borderRadius:16,padding:"32px 28px",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,.3)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div style={{fontFamily:"var(--font-serif)",fontSize:"1.5rem",fontWeight:300}}>
                {mode==="reset" ? "Redefinir senha" : "Entrar na conta"}
              </div>
              <button onClick={onClose} className="btn" style={{background:"transparent",border:"1px solid var(--stone)",borderRadius:8,padding:"4px 10px",color:"var(--muted)",fontSize:".85rem"}}>✕</button>
            </div>
            {mode==="reset" && resetSent ? (
              <div style={{textAlign:"center",padding:"16px 0"}}>
                <div style={{fontSize:"2rem",marginBottom:12}}>📧</div>
                <div style={{fontFamily:"var(--font-sans)",fontSize:".82rem",color:"var(--muted2)",lineHeight:1.7}}>
                  Enviamos um link para <strong>{email}</strong>.<br/>Verifique sua caixa de entrada.
                </div>
                <button onClick={()=>{setMode("login");setResetSent(false);}} className="btn" style={{marginTop:20,padding:"9px 24px",borderRadius:8,background:"var(--ink)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem"}}>← Voltar ao login</button>
              </div>
            ) : (
              <>
                <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
                  <div>
                    <label style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted2)",display:"block",marginBottom:6}}>E-mail</label>
                    <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():doReset())} placeholder="seu@email.com" autoFocus />
                  </div>
                  {mode==="login" && (
                    <div>
                      <label style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted2)",display:"block",marginBottom:6}}>Senha</label>
                      <div className="pass-wrap">
                        <input className="inp" type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="Sua senha" style={{paddingRight:36}} />
                        <span className="pass-eye" onClick={()=>setShowPw(p=>!p)}>{showPw?"🙈":"👁️"}</span>
                      </div>
                    </div>
                  )}
                </div>
                <button onClick={mode==="login"?doLogin:doReset} disabled={loading} className="btn" style={{width:"100%",padding:"12px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"1.5px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {loading&&<span className="spinner" />}
                  {mode==="login" ? "ENTRAR" : "ENVIAR LINK"}
                </button>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
                  {mode==="login" ? (
                    <button onClick={()=>setMode("reset")} className="btn" style={{background:"transparent",fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",padding:0}}>Esqueci a senha</button>
                  ) : (
                    <button onClick={()=>setMode("login")} className="btn" style={{background:"transparent",fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",padding:0}}>← Voltar</button>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 10. SEARCH SCREEN — tela inicial de busca de salões
    // ════════════════════════════════════════════════════════════════════════════
    const SAMPLE_SALONS = [
      { id:"s1", name:"Studio Âmbar", type:"Salão de Beleza", city:"São Paulo", state:"SP", services:["Corte","Escova","Coloração"], rating:4.9, reviews:128, verified:true, color:"#C9A96E" },
      { id:"s2", name:"Barbearia Ferro & Arte", type:"Barbearia", city:"Rio de Janeiro", state:"RJ", services:["Corte masculino","Barba","Navalhado"], rating:4.8, reviews:94, verified:true, color:"#79B8D4" },
      { id:"s3", name:"Espaço Lumière", type:"Salão + Estética", city:"Belo Horizonte", state:"MG", services:["Manicure","Pedicure","Skincare"], rating:4.7, reviews:67, verified:true, color:"#A67FC4" },
      { id:"s4", name:"Beleza Nativa", type:"Salão de Beleza", city:"Curitiba", state:"PR", services:["Escova","Progressiva","Mechas"], rating:4.6, reviews:53, verified:false, color:"#5BAA5B" },
      { id:"s5", name:"Hair Lab São Paulo", type:"Coloração Especializada", city:"São Paulo", state:"SP", services:["Coloração","Mechas","Ombré"], rating:5.0, reviews:42, verified:true, color:"#D4735A" },
      { id:"s6", name:"Nail Studio Premium", type:"Esmalteria", city:"Porto Alegre", state:"RS", services:["Gel","Fibra","Nail art"], rating:4.8, reviews:81, verified:true, color:"#C9A96E" },
    ];

    const SERVICE_FILTERS = ["Todos","Cabelo","Unhas","Estética","Barba","Massagem","Depilação"];

    function SearchScreen({ onRegister, onLanding, showToast, authUser, hasDraft, onRestoreDraft }) {
      const [query,      setQuery]      = useState("");
      const [cityFilter, setCityFilter] = useState("");
      const [svcFilter,  setSvcFilter]  = useState("Todos");
      const [salons,     setSalons]     = useState(SAMPLE_SALONS);
      const [loading,    setLoading]    = useState(false);
      const [searched,   setSearched]   = useState(false);
      const [selected,   setSelected]   = useState(null);
      const [sortBy,     setSortBy]     = useState("rating"); // "rating"|"name"|"newest"
      const [page,       setPage]       = useState(1);
      const PAGE_SIZE = 9;

      const doSearch = (overrideFilter) => {
        const activeFilter = overrideFilter !== undefined ? overrideFilter : svcFilter;
        setLoading(true);
        setSelected(null);
        setTimeout(() => {
          const q = query.toLowerCase().trim();
          const c = cityFilter.toLowerCase().trim();
          // Busca no Firestore (salões aprovados reais) + fallback SAMPLE_SALONS
          const searchInSource = (source) => source.filter(s => {
            const matchQ = !q || s.name.toLowerCase().includes(q) || s.type.toLowerCase().includes(q) || (s.services||[]).some(sv => sv.toLowerCase().includes(q)) || (s.description||"").toLowerCase().includes(q);
            const matchC = !c || (s.city||"").toLowerCase().includes(c) || (s.state||"").toLowerCase().includes(c);
            const matchS = activeFilter === "Todos" || (s.services||[]).some(sv => sv.toLowerCase().includes(activeFilter.toLowerCase())) || (s.type||"").toLowerCase().includes(activeFilter.toLowerCase());
            return matchQ && matchC && matchS;
          });
          // Tenta Firestore; fallback para SAMPLE_SALONS
          db.collection("establishments").where("status","==","approved").limit(50).get()
            .then(snap => {
              const real = snap.docs.map(d => ({id:d.id, ...d.data(), verified:true}));
              const merged = [...real, ...SAMPLE_SALONS.filter(s => !real.find(r => r.id===s.id))];
              setSalons(searchInSource(merged));
            })
            .catch(() => setSalons(searchInSource(SAMPLE_SALONS)))
            .finally(() => { setLoading(false); setSearched(true); });
        }, 300);
      };

      const stars = n => "★".repeat(Math.floor(n)) + (n % 1 >= 0.5 ? "½" : "") + "☆".repeat(5 - Math.ceil(n));

      // Computed sort + pagination (moved out of JSX to avoid IIFE syntax issues)
      const sortedSalons = [...salons].sort((a,b)=>{
        if(sortBy==="rating") return (b.rating||0)-(a.rating||0);
        if(sortBy==="name") return (a.name||"").localeCompare(b.name||"","pt-BR");
        if(sortBy==="newest") return (b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0);
        return 0;
      });
      const pagedSalons = sortedSalons.slice(0, page*PAGE_SIZE);
      const hasMore = sortedSalons.length > pagedSalons.length;

      return (
        <div style={{minHeight:"calc(100vh - 60px)"}}>
          {/* Hero search */}
          <div style={{background:"linear-gradient(160deg,#1A1715 0%,#2C2420 60%,#1A1715 100%)",padding:"56px 24px 48px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 20% 60%,rgba(201,169,110,.13) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(201,169,110,.07) 0%,transparent 40%)"}} />
            <div style={{position:"relative",maxWidth:720,margin:"0 auto",textAlign:"center"}}>
              <span style={{fontFamily:"var(--font-sans)",fontSize:".62rem",letterSpacing:"5px",color:"var(--gold)"}}>ENCONTRE SEU SALÃO IDEAL</span>
              <h1 style={{fontFamily:"var(--font-serif)",fontSize:"clamp(2rem,5vw,3.2rem)",color:"#F7F5F0",fontWeight:300,lineHeight:1.15,margin:"16px 0 32px"}}>
                Salões verificados,<br/><em style={{color:"var(--gold)"}}>perto de você</em>
              </h1>
              {/* Search bar */}
              <div style={{background:"#fff",borderRadius:12,padding:"6px 6px 6px 18px",display:"flex",gap:8,alignItems:"center",boxShadow:"0 12px 40px rgba(0,0,0,.3)",marginBottom:14}}>
                <span style={{fontSize:"1rem"}}>🔍</span>
                <input
                  value={query}
                  onChange={e=>setQuery(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&doSearch()}
                  placeholder="Salão, serviço ou especialidade..."
                  style={{flex:1,border:"none",outline:"none",fontFamily:"var(--font-sans)",fontSize:".88rem",color:"var(--ink)",background:"transparent"}}
                />
                <input
                  value={cityFilter}
                  onChange={e=>setCityFilter(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&doSearch()}
                  placeholder="Cidade ou estado"
                  style={{width:180,border:"none",borderLeft:"1px solid var(--stone)",paddingLeft:12,outline:"none",fontFamily:"var(--font-sans)",fontSize:".82rem",color:"var(--ink)",background:"transparent"}}
                />
                <button onClick={doSearch} className="btn" style={{padding:"10px 22px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".8rem",letterSpacing:"1.5px",fontWeight:500,whiteSpace:"nowrap"}}>
                  BUSCAR
                </button>
              </div>
              {/* Service filters */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
                {SERVICE_FILTERS.map(f=>(
                  <button key={f} onClick={()=>{setSvcFilter(f); doSearch(f);}} className="btn" style={{
                    padding:"5px 14px",borderRadius:20,fontFamily:"var(--font-sans)",fontSize:".68rem",
                    background:svcFilter===f?"var(--gold)":"rgba(255,255,255,.08)",
                    color:svcFilter===f?"#fff":"rgba(255,255,255,.65)",
                    border:`1px solid ${svcFilter===f?"var(--gold)":"rgba(255,255,255,.18)"}`,
                    letterSpacing:"0.5px",
                  }}>{f}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Results */}
          <div style={{maxWidth:900,margin:"0 auto",padding:"32px 24px"}}>
            {/* Continue registration banner */}
            {authUser&&hasDraft&&(
              <div className="fade-up" style={{background:"#FFF8ED",border:"1px solid #F0D99A",borderRadius:10,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <span style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:"#7A6020"}}>☁️ Você tem um cadastro em andamento. Continuar de onde parou?</span>
                <button onClick={onRestoreDraft} className="btn" style={{padding:"6px 16px",borderRadius:6,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".75rem",whiteSpace:"nowrap"}}>Continuar cadastro</button>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
              <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)",letterSpacing:"2px"}}>
                {loading ? "BUSCANDO..." : searched ? `${salons.length} RESULTADO${salons.length!==1?"S":""} ENCONTRADO${salons.length!==1?"S":""}` : "DESTAQUES"}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <select value={sortBy} onChange={e=>{setSortBy(e.target.value);setPage(1);}} style={{fontFamily:"var(--font-sans)",fontSize:".68rem",border:"1px solid var(--stone2)",borderRadius:6,padding:"5px 10px",background:"#fff",color:"var(--ink)",outline:"none"}}>
                  <option value="rating">Melhor avaliação</option>
                  <option value="name">Nome A–Z</option>
                  <option value="newest">Mais recentes</option>
                </select>
                <button onClick={onRegister} className="btn" style={{padding:"7px 16px",borderRadius:8,background:"var(--ink)",color:"#F7F5F0",fontFamily:"var(--font-sans)",fontSize:".68rem",letterSpacing:"1.5px"}}>
                  + CADASTRAR MEU SALÃO
                </button>
              </div>
            </div>

            {loading && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
                {[1,2,3,4,5,6].map(i=>(
                  <div key={i} style={{background:"#fff",borderRadius:14,padding:"20px",border:"1px solid var(--stone)"}}>
                    <div className="skeleton" style={{height:18,width:"70%",marginBottom:10}} />
                    <div className="skeleton" style={{height:12,width:"50%",marginBottom:16}} />
                    <div className="skeleton" style={{height:10,width:"90%",marginBottom:6}} />
                    <div className="skeleton" style={{height:10,width:"60%"}} />
                  </div>
                ))}
              </div>
            )}

            {!loading && salons.length === 0 && searched && (
              <div style={{textAlign:"center",padding:"64px 24px"}}>
                <div style={{fontSize:"2.5rem",marginBottom:12}}>🔍</div>
                <div style={{fontFamily:"var(--font-serif)",fontSize:"1.4rem",color:"var(--muted2)",marginBottom:8}}>Nenhum resultado encontrado</div>
                <div style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:"var(--muted)",marginBottom:24}}>Tente outros termos ou seja o primeiro a cadastrar nessa região.</div>
                <button onClick={onRegister} className="btn" style={{padding:"11px 28px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".8rem",letterSpacing:"2px"}}>CADASTRAR MEU SALÃO</button>
              </div>
            )}

            {!loading && salons.length > 0 && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))",gap:16}}>
                {pagedSalons.map((s,i)=>(
                  <div key={s.id} className="hov fade-up" onClick={()=>setSelected(sel=>sel?.id===s.id?null:s)}
                    style={{background:"#fff",borderRadius:14,padding:"20px",border:`1px solid ${selected?.id===s.id?"var(--gold)":"var(--stone)"}`,
                    boxShadow:selected?.id===s.id?"0 0 0 3px rgba(201,169,110,.18)":"var(--shadow-sm)",
                    borderTop:`3px solid ${s.color}`,cursor:"pointer",animationDelay:`${i*.06}s`,transition:"all .22s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div>
                        <div style={{fontFamily:"var(--font-serif)",fontSize:"1.1rem",fontWeight:400,marginBottom:2}}>{s.name}</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)",letterSpacing:".5px"}}>{s.type}</div>
                      </div>
                      {s.verified && <span style={{fontFamily:"var(--font-sans)",fontSize:".55rem",padding:"2px 8px",borderRadius:10,background:"#5BAA5B15",color:"#5BAA5B",border:"1px solid #5BAA5B30",whiteSpace:"nowrap"}}>✓ VERIFICADO</span>}
                    </div>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".7rem",color:"var(--gold)",marginBottom:8,letterSpacing:".3px"}}>
                      {stars(s.rating)} <span style={{color:"var(--muted)",fontSize:".65rem"}}>{s.rating} ({s.reviews} avaliações)</span>
                    </div>
                    <div style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted2)",marginBottom:10}}>
                      📍 {s.city}, {s.state}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {s.services.map(sv=>(
                        <span key={sv} style={{fontFamily:"var(--font-sans)",fontSize:".6rem",padding:"2px 8px",borderRadius:10,background:"var(--cream)",color:"var(--muted2)",border:"1px solid var(--stone)"}}>
                          {sv}
                        </span>
                      ))}
                    </div>
                    {selected?.id===s.id && (
                      <div className="fade-up" style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--stone)"}}>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted)",marginBottom:10}}>Entre em contato ou agende pelo perfil completo.</div>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={e=>{e.stopPropagation();showToast("Perfil completo em breve!","info");}} className="btn" style={{flex:1,padding:"8px",borderRadius:7,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".72rem"}}>Ver Perfil</button>
                          <button onClick={e=>{e.stopPropagation();showToast("Agendamento em breve!","info");}} className="btn" style={{flex:1,padding:"8px",borderRadius:7,background:"var(--ink)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".72rem"}}>Agendar</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {hasMore && (
                <div style={{gridColumn:"1/-1",textAlign:"center",marginTop:8}}>
                  <button onClick={()=>setPage(p=>p+1)} className="btn" style={{padding:"10px 32px",borderRadius:8,border:"1px solid var(--stone2)",background:"#fff",fontFamily:"var(--font-sans)",fontSize:".78rem",color:"var(--muted2)"}}>
                    Ver mais {Math.min(PAGE_SIZE, sortedSalons.length-pagedSalons.length)} salões
                  </button>
                </div>
              )}
              </div>
            )}

            {/* CTA para cadastro */}
            <div style={{marginTop:48,background:"linear-gradient(135deg,#1A1715,#2C2420)",borderRadius:16,padding:"32px",textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 80% 50%,rgba(201,169,110,.1) 0%,transparent 60%)"}} />
              <div style={{position:"relative"}}>
                <div style={{fontFamily:"var(--font-serif)",fontSize:"1.6rem",color:"#F7F5F0",fontWeight:300,marginBottom:8}}>
                  Seu salão ainda não está aqui?
                </div>
                <div style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:"#9A8F85",marginBottom:20,lineHeight:1.7}}>
                  Cadastre-se gratuitamente e apareça para milhares de clientes.
                </div>
                <button onClick={onRegister} className="btn" style={{padding:"12px 32px",borderRadius:8,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".82rem",letterSpacing:"2px",fontWeight:500}}>
                  CADASTRAR MEU NEGÓCIO →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 10. MAIN APP
    // ════════════════════════════════════════════════════════════════════════════
    function App(){
      const [screen,          setScreen]        = useState("search");
      const [accountType,     setAccountType]   = useState(null);
      const [step,            setStep]          = useState(1);
      const [formData,        dispatch]         = useReducer(formReducer, INITIAL_FORM);
      const [services,        setServices]      = useState([]);
      const [products,        setProducts]      = useState([]);
      const [errors,          setErrors]        = useState({});
      const [verifyingCNPJ,   setVerifyingCNPJ] = useState(false);
      const [cnpjData,        setCnpjData]      = useState(null);
      const [cnpjError,       setCnpjError]     = useState("");
      const [cnpjSuggestions, setCnpjSugg]     = useState([]);  // melhoria 3.3
      const [cnpjCooldown,    setCnpjCooldown]  = useState(false); // Fix #11: rate limit
      const [sendingCode,     setSendingCode]   = useState(false);
      const [logoPreview,     setLogoPreview]   = useState(null);
      const [coverPreview,    setCoverPreview]  = useState(null);
      const [toast,           setToast]         = useState(null);
      const [securityScore,   setSecurityScore] = useState(0);
      const [showPass,        setShowPass]      = useState(false);
      const [showCPass,       setShowCPass]     = useState(false);
      const [stepDir,         setStepDir]       = useState(1);
      const [isSubmitting,    setIsSubmitting]  = useState(false);
      const [authUser,        setAuthUser]      = useState(null);
      const [authLoading,     setAuthLoading]   = useState(true);
      const [draftLoading,    setDraftLoading]  = useState(false);
      const [hasDraft,        setHasDraft]      = useState(false);
      const [saveStatus,      setSaveStatus]    = useState("");
      const [showAdmin,       setShowAdmin]     = useState(false);
      const [showLogin,       setShowLogin]     = useState(false);

      const prevDataRef  = useRef({});
      const toastTimer   = useRef(null);
      const saveTimer    = useRef(null);
      const protocolRef  = useRef(null);
      const prevCEP      = useRef("");

      // ── Toast ──────────────────────────────────────────────────────────────
      const showToast = useCallback((msg,type="info")=>{
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({msg,type});
        toastTimer.current = setTimeout(()=>setToast(null),3500);
      },[]);
      useEffect(()=>()=>{
        if(toastTimer.current) clearTimeout(toastTimer.current);
        if(saveTimer.current)  clearTimeout(saveTimer.current);
      },[]);

      const set = useCallback((key,val)=>dispatch({key,val}),[]);

      // ── Firebase Auth ──────────────────────────────────────────────────────
      useEffect(()=>{
        const unsub = auth.onAuthStateChanged(user=>{
          setAuthUser(user);
          setAuthLoading(false);
          removeLoader(); // remove loading screen quando auth estiver pronto
          if (user) {
            setDraftLoading(true);
            loadDraftFS(user.uid)
              .then(draft=>{ if(draft&&Object.keys(draft).some(k=>draft[k])) setHasDraft(true); })
              .catch(()=>{})
              .finally(()=>setDraftLoading(false));
          }
        });
        return unsub;
      },[]);

      // ── Progresso por campos (melhoria 3.1) ───────────────────────────────
      const progress = useMemo(()=>calcProgress(formData),[formData]);

      // ── Auto-save com diff (melhoria 2.3) ─────────────────────────────────
      const isFirstRender = useRef(true);
      useEffect(()=>{
        if (!authUser) return;
        if (isFirstRender.current) {
          isFirstRender.current = false;
          prevDataRef.current = {...formData};
          return;
        }
        const changed = {};
        for (const [k,v] of Object.entries(formData)) {
          if (prevDataRef.current[k] !== v) changed[k] = v;
        }
        prevDataRef.current = {...formData};
        if (Object.keys(changed).length === 0) return;

        if (saveTimer.current) clearTimeout(saveTimer.current);
        setSaveStatus("saving");
        saveTimer.current = setTimeout(async()=>{
          try {
            // Fix #5: unifica em uma única chamada set para evitar race condition
            const clean = cleanData({...changed});
            if (Object.keys(clean).length > 0) {
              await db.collection("drafts").doc(authUser.uid).set(
                { ...clean, _services: services, _products: products, _updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
                { merge: true }
              );
            }
            setSaveStatus("saved"); setTimeout(()=>setSaveStatus(""),2000);
          }
          catch { setSaveStatus(""); }
        },1500);

        // Fix #9: cleanup do timer ao desmontar para evitar state update em componente morto
        return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
      },[formData,authUser,services,products]);

      // ── Security score ─────────────────────────────────────────────────────
      useEffect(()=>{
        let s=0;
        if(formData.cnpjVerified)  s+=20;
        if(formData.emailVerified) s+=15;
        if(formData.phoneVerified) s+=15;
        if(formData.ownerDoc||formData.ownerDocUrl) s+=25;
        if(formData.addressProof||formData.addressProofUrl) s+=25;
        setSecurityScore(s);
      },[formData.cnpjVerified,formData.emailVerified,formData.phoneVerified,formData.ownerDoc,formData.ownerDocUrl,formData.addressProof,formData.addressProofUrl]);

      // ── CEP autocomplete ───────────────────────────────────────────────────
      useEffect(()=>{
        const raw = formData.cep.replace(/\D/g,"");
        if (raw.length===8&&raw!==prevCEP.current) {
          prevCEP.current=raw;
          fetch(`https://viacep.com.br/ws/${raw}/json/`)
            .then(r=>r.json())
            .then(d=>{ if(!d.erro){ set("street",d.logradouro||""); set("neighborhood",d.bairro||""); set("city",d.localidade||""); set("state",d.uf||""); showToast("Endereço preenchido ✓","success"); }})
            .catch(()=>{});
        }
      },[formData.cep]);

      // ── CNPJ verify (melhoria 3.2 + 3.3) ──────────────────────────────────
      const verifyCNPJ = async()=>{
        if (!validateCNPJ(formData.cnpj)) { showToast("CNPJ inválido","error"); return; }
        if (cnpjCooldown) { showToast("Aguarde antes de consultar novamente","error"); return; }
        setVerifyingCNPJ(true); setCnpjError(""); setCnpjData(null); setCnpjSugg([]);
        try {
          const data = await fetchCNPJ(formData.cnpj);
          setCnpjData(data);
          set("cnpjVerified",true);
          // Pré-preenchimento inteligente (melhoria 3.2)
          if (!formData.businessName && data.razao_social) set("businessName",data.razao_social);
          if (!formData.tradeName && data.nome_fantasia)    set("tradeName",data.nome_fantasia);
          if (data.cep)       { set("cep",fmtCEP(data.cep.replace(/\D/g,""))); }
          if (data.logradouro)set("street",data.logradouro);
          if (data.numero)    set("number",data.numero);
          if (data.bairro)    set("neighborhood",data.bairro);
          if (data.municipio?.descricao) set("city",data.municipio.descricao);
          if (data.municipio?.uf)        set("state",data.municipio.uf);
          // Sugestão de serviços (melhoria 3.3)
          const sugg = suggestByCNAE(data.cnae_fiscal_principal?.descricao||"");
          setCnpjSugg(sugg);
          showToast("CNPJ verificado ✓"+(sugg.length?` · ${sugg.length} serviços sugeridos`:""),"success");
        } catch(err) {
          if (err.message==="not_found")           { setCnpjError("CNPJ não encontrado na Receita Federal"); showToast("CNPJ não encontrado","error"); }
          else if (err.message==="rate_limit")     { setCnpjError("API da Receita Federal sobrecarregada. Aguarde 1 minuto e tente novamente."); showToast("Limite de consultas atingido — aguarde","error"); }
          else if (err.message?.startsWith("inactive:")) { setCnpjError(`CNPJ ${err.message.split(":")[1]} na Receita Federal`); showToast("CNPJ não está ativo","error"); }
          else { set("cnpjVerified",true); showToast("CNPJ válido (API indisponível — verificado localmente)","info"); }
        } finally {
          setVerifyingCNPJ(false);
          // Fix #11: cooldown de 60s para evitar rate limit na API da Receita Federal
          setCnpjCooldown(true);
          setTimeout(()=>setCnpjCooldown(false), 60000);
        }
      };

      // ── OTP (melhoria 1.3) ─────────────────────────────────────────────────
      const sendVerification = async(type)=>{
        setSendingCode(true);
        try {
          const idToken = authUser ? await authUser.getIdToken() : null;
          const target  = type==="email" ? formData.email : formData.phone;
          const result  = await sendOTP(type, target, authUser?.uid||"demo", idToken);
          if (result?.demo) {
            showToast(`[DEMO] Código: ${result.otp} — configure EmailJS/Cloud Function para envio real`,"info");
          } else {
            showToast(`Código enviado para ${target}`,"success");
          }
        } catch(err) { showToast(err.message||"Erro ao enviar código","error"); }
        finally { setSendingCode(false); }
      };

      const checkCode = async(type)=>{
        const code   = type==="email"?formData.emailCode:formData.phoneCode;
        const target = type==="email"?formData.email:formData.phone;
        if (CLOUD_FN_URL && authUser) {
          const idToken = await authUser.getIdToken();
          const ok = await verifyOTPCloud(type, authUser.uid, code, idToken);
          if (ok) { set(type==="email"?"emailVerified":"phoneVerified",true); showToast(`${type==="email"?"E-mail":"Telefone"} verificado ✓`,"success"); }
          else showToast("Código incorreto ou expirado","error");
        } else {
          const ok = verifyOTPLocal(type, authUser?.uid||"demo", code, target);
          if (ok) { set(type==="email"?"emailVerified":"phoneVerified",true); showToast(`${type==="email"?"E-mail":"Telefone"} verificado ✓`,"success"); }
          else showToast("Código incorreto","error");
        }
      };

      // ── Navigation ─────────────────────────────────────────────────────────
      const goToStep = n=>{
        if(n<step){ setStepDir(-1);setStep(n);setErrors({});window.scrollTo(0,0); }
        // Permite avançar apenas para o próximo step (não pular etapas)
        else if(n===step+1){ if(validateStep()){ setStepDir(1);setStep(n);setErrors({});window.scrollTo(0,0); } }
      };

      const validateStep = ()=>{
        const e={};
        if(step===1){
          if(!formData.businessName)         e.businessName="Nome obrigatório";
          if(!validateCNPJ(formData.cnpj))   e.cnpj="CNPJ inválido";
          if(!formData.cnpjVerified)         e.cnpjVerified="Verifique o CNPJ";
          if(!validateEmail(formData.email)) e.email="E-mail inválido";
          if(!formData.phone)                e.phone="Telefone obrigatório";
        }
        if(step===2){
          if(!formData.cep)    e.cep="CEP obrigatório";
          if(!formData.street) e.street="Rua obrigatória";
          if(!formData.number) e.number="Número obrigatório";
          if(!formData.city)   e.city="Cidade obrigatória";
          if(!formData.state)  e.state="Estado obrigatório";
        }
        if(step===3){
          if(!formData.ownerName)  e.ownerName="Nome obrigatório";
          if(!formData.ownerEmail)              e.ownerEmail="E-mail obrigatório";
          else if(!validateEmail(formData.ownerEmail)) e.ownerEmail="E-mail inválido";
          if(formData.ownerCPF&&!validateCPF(formData.ownerCPF)) e.ownerCPF="CPF inválido";
        }
        if(step===4){
          if(!formData.emailVerified) e.emailVerified="Confirme o e-mail";
          if(!formData.phoneVerified) e.phoneVerified="Confirme o telefone";
        }
        if(step===5){
          const pw=formData.password;
          if(pw.length<8)                     e.password="Mínimo 8 caracteres";
          else if(!/[A-Z]/.test(pw))          e.password="Inclua ao menos uma maiúscula";
          else if(!/[0-9]/.test(pw))          e.password="Inclua ao menos um número";
          if(pw!==formData.confirmPassword)   e.confirmPassword="Senhas não conferem";
          if(!formData.acceptTerms)           e.acceptTerms="Aceite os termos";
          if(!formData.acceptPrivacy)         e.acceptPrivacy="Aceite a política";
          if(!formData.acceptAntiFraud)       e.acceptAntiFraud="Aceite os termos antifraude";
        }
        setErrors(e);
        return Object.keys(e).length===0;
      };

      const nextStep = ()=>{ if(validateStep()){setStepDir(1);setStep(p=>p+1);window.scrollTo(0,0);} };
      const prevStep = ()=>{ setStepDir(-1);setStep(p=>p-1);setErrors({});window.scrollTo(0,0); };

      // ── Submit ─────────────────────────────────────────────────────────────
      const handleSubmit = async()=>{
        if (!validateStep()) return;
        setIsSubmitting(true);
        if (!protocolRef.current) protocolRef.current=`BH-${uid().slice(0,8).toUpperCase()}`;
        try {
          let userId = authUser?.uid;
          if (!userId) {
            const cred = await auth.createUserWithEmailAndPassword(formData.email,formData.password);
            userId = cred.user.uid;
          }
          await submitToFirestore(userId,formData,services,products,protocolRef.current);
          setScreen("review");
        } catch(err) {
          if (err.message==="cnpj_duplicate") showToast("Este CNPJ já está cadastrado na plataforma.","error");
          else if (err.code==="auth/email-already-in-use") showToast("E-mail já cadastrado. Tente fazer login.","error");
          else if (err.code==="auth/weak-password")   showToast("Senha muito fraca (Firebase: mínimo 6 chars)","error");
          else { showToast("Erro ao salvar. Tente novamente.","error"); console.error(err); }
        } finally { setIsSubmitting(false); }
      };

      const handleImageUpload = (e,setter)=>{
        const f=e.target.files[0];if(!f)return;
        if(!ALLOWED_IMAGE_TYPES.includes(f.type)){showToast("Formato inválido","error");e.target.value="";return;}
        if(f.size>5*1024*1024){showToast("Máx 5MB","error");e.target.value="";return;}
        const r=new FileReader();r.onload=ev=>setter(ev.target.result);r.readAsDataURL(f);
      };

      const restoreDraft = async()=>{
        if(!authUser)return;
        setDraftLoading(true);
        try {
          const draft=await loadDraftFS(authUser.uid);
          if(draft){
            // Fix #12: filtra apenas chaves conhecidas do INITIAL_FORM para evitar injeção de dados desconhecidos
            const KNOWN_KEYS = new Set([...Object.keys(INITIAL_FORM), "_services", "_products"]);
            const safeDraft = Object.fromEntries(Object.entries(draft).filter(([k])=>KNOWN_KEYS.has(k)));
            if(Array.isArray(safeDraft._services)) { setServices(safeDraft._services); delete safeDraft._services; }
            if(Array.isArray(safeDraft._products)) { setProducts(safeDraft._products); delete safeDraft._products; }
            dispatch({key:"__reset",val:safeDraft});
            setHasDraft(false);
            setScreen("form");
            showToast("Rascunho restaurado ✓","success");
          }
        } catch { showToast("Erro ao carregar rascunho","error"); }
        finally { setDraftLoading(false); }
      };

      // Bug fix: limpa sugestões de CNAE quando accountType não é salão
      useEffect(()=>{
        if (accountType==="fornecedor") setCnpjSugg([]);
      },[accountType]);
      const needsServices = accountType==="salao"||accountType==="ambos";
      const needsProducts = accountType==="fornecedor"||accountType==="ambos";
      const totalSteps    = 5;
      const pwStrength    = passwordStrength(formData.password);

      // Admin panel — guarda por autenticação e lista de UIDs admin
      if (showAdmin) {
        if (!authUser || !ADMIN_UIDS.includes(authUser.uid)) {
          return (
            <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F8F6F2",gap:16}}>
              <div style={{fontSize:"3rem"}}>🔒</div>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.4rem"}}>Acesso restrito</div>
              <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".82rem",color:"#9A9288"}}>Faça login para acessar o painel admin.</div>
              <button onClick={()=>setShowAdmin(false)} className="btn" style={{padding:"10px 24px",borderRadius:8,background:"#1A1715",color:"#fff",fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:".78rem"}}>← Voltar</button>
            </div>
          );
        }
        return <AdminPanel onBack={()=>setShowAdmin(false)} currentUser={authUser} />;
      }

      if (authLoading) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--cream)"}}>
          <div style={{textAlign:"center"}}>
            <div style={{width:40,height:40,border:"3px solid #EDE9E2",borderTopColor:"#C9A96E",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 16px"}} />
            <div style={{fontFamily:"var(--font-sans)",fontSize:".8rem",color:"var(--muted)"}}>Carregando...</div>
          </div>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"var(--cream)"}}>
          {/* TOAST */}
          {toast&&(
            <div style={{position:"fixed",top:16,right:16,zIndex:9999,animation:"toastIn .28s ease",
              background:toast.type==="error"?"#2A1210":toast.type==="success"?"#0F2010":toast.type==="info"?"#14203A":"#1A1715",
              color:toast.type==="error"?"#F4907A":toast.type==="success"?"#7DC97D":toast.type==="info"?"#79B8D4":"#F7F5F0",
              padding:"12px 20px",borderRadius:10,fontFamily:"var(--font-sans)",fontSize:".82rem",
              boxShadow:"0 8px 32px rgba(0,0,0,.35)",
              borderLeft:`3px solid ${toast.type==="error"?"#D4735A":toast.type==="success"?"#5BAA5B":toast.type==="info"?"#79B8D4":"#C9A96E"}`,
              maxWidth:380,lineHeight:1.5}}>
              {toast.msg}
            </div>
          )}

          {/* LOGIN MODAL */}
          {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} showToast={showToast} onSuccess={()=>setScreen("dashboard")} />}

          {/* DRAFT BANNER */}
          {hasDraft&&(screen==="landing"||screen==="search")&&authUser&&(
            <div className="fade-up" style={{background:"#FFF8ED",borderBottom:"1px solid #F0D99A",padding:"10px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:"#7A6020"}}>☁️ Rascunho salvo. Continuar de onde parou?</span>
              <div style={{display:"flex",gap:8}}>
                <button className="btn" onClick={restoreDraft} disabled={draftLoading} style={{padding:"6px 16px",borderRadius:6,background:"var(--gold)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".75rem"}}>
                  {draftLoading?"Carregando...":"Restaurar rascunho"}
                </button>
                <button className="btn" onClick={()=>setHasDraft(false)} style={{padding:"6px 12px",borderRadius:6,background:"transparent",color:"var(--muted)",border:"1px solid var(--stone2)",fontFamily:"var(--font-sans)",fontSize:".75rem"}}>Descartar</button>
              </div>
            </div>
          )}

          {/* NAV */}
          <nav style={{background:"#fff",borderBottom:"1px solid var(--stone)",padding:"0 24px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.04)"}}>
            <div onClick={()=>{setScreen("search");setStep(1);}} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontFamily:"var(--font-serif)",fontSize:"1.4rem",color:"var(--ink)",letterSpacing:"1px"}}>
                beleza<em style={{color:"var(--gold)"}}>.</em>hub
              </span>
              <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)",letterSpacing:"3px"}}>{screen==="search"?"BUSCA DE SALÕES":"CADASTRO EMPRESARIAL"}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              {/* Progresso real (melhoria 3.1) — exibido durante o form */}
              {screen==="form"&&(
                <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--gold)"}}>
                  {progress.pct}% · {progress.filled}/{progress.total} campos
                </span>
              )}
              {authUser&&saveStatus&&(
                <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:saveStatus==="saved"?"var(--green)":"var(--muted)",display:"flex",alignItems:"center",gap:4}}>
                  {saveStatus==="saving"&&<span className="spinner" style={{width:10,height:10,borderTopColor:"var(--muted)",marginRight:0}} />}
                  {saveStatus==="saving"?"Salvando...":"☁️ Salvo"}
                </span>
              )}
              {authUser ? (
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--muted)"}}>🔐 {authUser.email}</span>
                  <button onClick={()=>auth.signOut().then(()=>showToast("Sessão encerrada","info"))} className="btn" style={{fontFamily:"var(--font-sans)",fontSize:".62rem",color:"var(--red)",background:"transparent",padding:"3px 8px",borderRadius:6,border:"1px solid #F4D0C8"}}>Sair</button>
                </div>
              ) : (
                <button onClick={()=>setShowLogin(true)} className="btn" style={{fontFamily:"var(--font-sans)",fontSize:".68rem",color:"var(--ink)",background:"var(--cream)",padding:"5px 12px",borderRadius:6,border:"1px solid var(--stone2)"}}>Entrar</button>
              )}
              {/* Link admin — visível apenas para admins configurados em ADMIN_UIDS */}
              {authUser && ADMIN_UIDS.includes(authUser.uid) && (
                <button onClick={()=>setShowAdmin(true)} className="btn" style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)",background:"transparent",padding:"4px 8px",borderRadius:6,border:"1px solid var(--stone)"}}>Admin</button>
              )}
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div className="sec-dot" style={{width:8,height:8,borderRadius:"50%",background:securityScore>60?"#5BAA5B":securityScore>30?"#E8B86D":"#D4735A",boxShadow:`0 0 6px ${securityScore>60?"#5BAA5B":securityScore>30?"#E8B86D":"#D4735A"}`}} />
                <span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted2)"}}>Seg.: {securityScore}%</span>
              </div>
            </div>
          </nav>


          {/* ══ SEARCH ════════════════════════════════════════════════════════ */}
          {screen==="search"&&(
            <SearchScreen onRegister={()=>setScreen("type")} onLanding={()=>setScreen("landing")} showToast={showToast} authUser={authUser} hasDraft={hasDraft} onRestoreDraft={restoreDraft} />
          )}

          {/* ══ LANDING ══════════════════════════════════════════════════════ */}
          {screen==="landing"&&(
            <div className="fade-up">
              <div style={{background:"linear-gradient(160deg,#1A1715 0%,#2C2420 60%,#1A1715 100%)",padding:"72px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 15% 50%,rgba(201,169,110,.12) 0%,transparent 50%),radial-gradient(circle at 85% 20%,rgba(201,169,110,.08) 0%,transparent 40%)"}} />
                <div style={{position:"relative"}}>
                  <span style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"5px",color:"var(--gold)"}}>PLATAFORMA VERIFICADA · FIREBASE POWERED</span>
                  <h1 style={{fontFamily:"var(--font-serif)",fontSize:"clamp(2.2rem,5vw,3.8rem)",color:"#F7F5F0",fontWeight:300,lineHeight:1.1,margin:"20px 0 16px"}}>
                    Cadastre seu negócio<br/><em style={{color:"var(--gold)"}}>com segurança total</em>
                  </h1>
                  <p style={{fontFamily:"var(--font-sans)",color:"#9A8F85",fontSize:".9rem",maxWidth:520,margin:"0 auto 40px",lineHeight:1.7}}>
                    Dados salvos em tempo real no Firebase. CNPJ verificado na Receita Federal. Acesso de qualquer dispositivo.
                  </p>
                  <button className="btn" onClick={()=>setScreen("type")} style={{background:"var(--gold)",color:"#fff",padding:"14px 40px",borderRadius:8,fontFamily:"var(--font-sans)",fontSize:".85rem",letterSpacing:"2px",fontWeight:500}}>
                    COMEÇAR CADASTRO
                  </button>
                </div>
              </div>
              {/* Feature grid */}
              <div style={{background:"#fff",padding:"40px 24px",borderBottom:"1px solid var(--stone)"}}>
                <div style={{maxWidth:800,margin:"0 auto"}}>
                  <p style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"4px",color:"var(--muted)",textAlign:"center",marginBottom:24}}>TECNOLOGIA · PRODUÇÃO REAL</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:16}}>
                    {[
                      {icon:"🏛️",title:"CNPJ Real",         desc:"API Receita Federal pública + pré-preenchimento"},
                      {icon:"☁️", title:"Firebase Storage",   desc:"Documentos salvos com segurança na nuvem"},
                      {icon:"🔐",title:"Firebase Auth",      desc:"Login seguro por e-mail"},
                      {icon:"📊",title:"Progresso Real",     desc:"Barra baseada em campos preenchidos"},
                      {icon:"📍",title:"CEP Automático",     desc:"ViaCEP preenche o endereço"},
                      {icon:"🛡️",title:"OTP Seguro",         desc:"Código gerado e validado com expiração"},
                      {icon:"🤖",title:"CNAE → Serviços",   desc:"Sugestões automáticas pelo ramo de atividade"},
                      {icon:"🔒",title:"Antifraude",         desc:"Validação CNPJ + CPF + docs + backend rules"},
                    ].map((b,i)=>(
                      <div key={b.title} className="hov fade-up" style={{textAlign:"center",padding:"20px 12px",background:"var(--cream)",borderRadius:12,border:"1px solid var(--stone)",animationDelay:`${i*.07}s`}}>
                        <div style={{fontSize:"1.8rem",marginBottom:8}}>{b.icon}</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".72rem",fontWeight:600,marginBottom:4}}>{b.title}</div>
                        <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",color:"var(--muted)",lineHeight:1.4}}>{b.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              {/* Plan cards */}
              <div style={{maxWidth:800,margin:"0 auto",padding:"48px 24px"}}>
                <h2 style={{fontFamily:"var(--font-serif)",fontSize:"2rem",fontWeight:300,textAlign:"center",marginBottom:32}}>O que você pode cadastrar</h2>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:20}}>
                  {PLAN_TYPES.map((t,i)=>(
                    <div key={t.id} className="hov fade-up" onClick={()=>{setAccountType(t.id);setScreen("type");}} style={{background:"#fff",borderRadius:14,padding:"28px 24px",border:"1px solid var(--stone)",boxShadow:"var(--shadow-sm)",borderTop:`3px solid ${t.color}`,animationDelay:`${i*.1}s`}}>
                      <div style={{fontSize:"2rem",marginBottom:12}}>{t.icon}</div>
                      <h3 style={{fontFamily:"var(--font-serif)",fontSize:"1.2rem",fontWeight:400,marginBottom:8}}>{t.label}</h3>
                      <p style={{fontFamily:"var(--font-sans)",fontSize:".75rem",color:"var(--muted2)",lineHeight:1.6}}>{t.desc}</p>
                      <div style={{marginTop:16,fontFamily:"var(--font-sans)",fontSize:".7rem",color:t.color,letterSpacing:"1px"}}>SELECIONAR →</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══ TYPE SELECTION ════════════════════════════════════════════════ */}
          {screen==="type"&&(
            <div className="slide-in" style={{maxWidth:720,margin:"0 auto",padding:"48px 24px"}}>
              <h2 style={{fontFamily:"var(--font-serif)",fontSize:"2.2rem",fontWeight:300,marginBottom:8,textAlign:"center"}}>Qual é o seu tipo de negócio?</h2>
              <p style={{fontFamily:"var(--font-sans)",fontSize:".82rem",color:"var(--muted)",textAlign:"center",marginBottom:40}}>Isso define quais seções você vai preencher</p>
              <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:32}}>
                {PLAN_TYPES.map(t=>(
                  <div key={t.id} onClick={()=>setAccountType(t.id)} style={{
                    background:"#fff",borderRadius:14,padding:"24px",
                    border:`2px solid ${accountType===t.id?t.color:"#DDD8CE"}`,
                    cursor:"pointer",transition:"all .22s",
                    boxShadow:accountType===t.id?`0 0 0 4px ${t.color}18`:"none",
                    display:"flex",alignItems:"center",gap:20,
                    transform:accountType===t.id?"translateY(-1px)":"none",
                  }}>
                    <div style={{width:52,height:52,borderRadius:12,background:`${t.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.6rem",flexShrink:0}}>{t.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"var(--font-serif)",fontSize:"1.2rem",marginBottom:4}}>{t.label}</div>
                      <div style={{fontFamily:"var(--font-sans)",fontSize:".78rem",color:"var(--muted2)"}}>{t.desc}</div>
                    </div>
                    <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${accountType===t.id?t.color:"#DDD8CE"}`,background:accountType===t.id?t.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
                      {accountType===t.id&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}} />}
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn" disabled={!accountType} onClick={()=>setScreen("form")} style={{width:"100%",padding:"14px",borderRadius:8,background:accountType?PLAN_TYPES.find(t=>t.id===accountType)?.color:"var(--stone2)",color:"#fff",fontFamily:"var(--font-sans)",fontSize:".85rem",letterSpacing:"2px",fontWeight:500}}>

              </button>
            </div>

          {/* ══ FORM ══════════════════════════════════════════════════════════ */}
          {screen==="form"&&(
            <div style={{maxWidth:720,margin:"0 auto",padding:"32px 24px"}}>
              {/* Progress — baseado em campos reais (melhoria 3.1) */}

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--muted)"}}>Etapa {step} de {totalSteps}</span>
                  <span style={{fontFamily:"var(--font-sans)",fontSize:".72rem",color:"var(--gold)"}}>
                    {progress.pct}% · {progress.filled}/{progress.total} campos
                  </span>
                </div>
                <div className="score-bar" style={{marginBottom:10,height:4}}>
                  <div className="score-fill" style={{width:`${progress.pct}%`,background:"linear-gradient(90deg,#C9A96E,#E8C98A)"}} />
                </div>
                <div style={{display:"flex",gap:4}}>
                  {["Empresa","Endereço","Responsável","Verificação","Acesso"].map((label,i)=>{
                    const n=i+1,done=n<step,active=n===step;

                      <div key={n} className="step-pill" onClick={()=>goToStep(n)}
                        title={label}
                        style={{
                          flex:1,textAlign:"center",
                          background:active?"var(--ink)":done?"#C9A96E15":"var(--stone2)",
                          color:active?"#F7F5F0":done?"var(--gold)":"#B0A898",
                          border:`1px solid ${active?"#1A1715":done?"#C9A96E40":"transparent"}`,
                          cursor:done||active?"pointer":"default",
                          overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",
                        }}>
                        <span className="step-label-full" style={{display:"inline"}}>{done?"✓ ":""}{label}</span>
                        <span className="step-label-short" style={{display:"none"}}>{done?"✓":n}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Security score */}
              <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:24,border:"1px solid var(--stone)",display:"flex",alignItems:"center",gap:12}}>

                  <div style={{fontFamily:"var(--font-sans)",fontSize:".65rem",letterSpacing:"2px",color:"var(--muted)",marginBottom:4}}>PONTUAÇÃO DE SEGURANÇA</div>
