<!DOCTYPE html>
<!-- PORTAL DO CLIENTE — v80
  Correções v80:
  - [FIX-portal-v80-PBKDF2] fazerLogin usava SHA-256 simples para verificar a senha,
    mas index.html v89 passou a salvar credenciais com PBKDF2/SHA-256 + salt (128 bits).
    Resultado: TODAS as senhas novas eram rejeitadas com 'Senha incorreta'.
    Fix: adicionadas _portalGerarSalt, _portalHashSenha, _portalVerificarSenha
    (idênticas às do index.html v89+). fazerLogin agora usa _portalVerificarSenha:
    tenta PBKDF2 se senhaSalt presente, cai para SHA-256 legado se não tiver.
    renderExpirada e renderEsqueci também migradas para salvar com PBKDF2+salt.
  - [FIX-portal-v80-AUTOLOGIN] init() não lia o parâmetro ?s=SENHA da URL.
    Quando o cliente clicava no link portal.html?cnpj=XXX&s=SENHA, a senha
    era ignorada — cliente tinha que digitá-la manualmente (e falhava por PBKDF2).
    Fix: init() lê p.get('s'), remove da URL (segurança) e dispara auto-login.
  Correções v79:
  - [FIX-v79-MAP-ESC] _safeMapUrl inserida em href sem esc() — URL com aspas duplas (")
    quebrava o atributo e permitia injeção de atributos HTML (ex: onmouseover).
    O filtro /^https?:\/\// bloqueava javascript: mas não aspas. Corrigido com esc().
  - [FIX-v79-SESS-GUARD] renderLista(): guard if(!sessao){renderLogin();return;} adicionado
    no início — evita TypeError ao acessar sessao.cnpj quando chamada sem sessão ativa
    (ex: btnRetentar após expiração, ou popstate em edge case).
  Correções v78:
  - [FIX-v78-HISTORY-BACK] btnVoltar agora usa history.back() em vez de renderLista().
    renderLista() chamava pushState, empilhando entradas duplicadas na pilha de histórico
    a cada vez que o usuário clicava Voltar. history.back() faz pop correto do estado 'detalhe',
    popstate dispara → renderLista sem nova entrada. Limpeza de observer/cache movida para renderLista.
  - [FIX-v78-CLEANUP] Observer (_portalThumbObs) e cache de fotos (_portalImgCache) limpos
    no início de renderLista — cobre todos os caminhos (btnVoltar, Android back, logout, expiração).
  Correções v77:
  - [FIX-v77-HISTORY-BUG] popstate: lógica estava invertida — e.state é o estado de DESTINO,
    não de origem. Back de detalhe→lista disparava renderLogin; back de lista→null disparava
    renderLista. Condições corrigidas: state.portal==='lista' → renderLista; state===null → renderLogin.
  - [FIX-v77-TOAST-DIRECT] (index.html) 6 blocos escreviam diretamente em #toast bypassando
    uxToast: rascunho salvo, PDF gerado, relatório salvo, 3x acesso restrito. Todos migrados para showToast().
  - [FIX-v77-SEARCH-DEBOUNCE] Campo de busca: debounce de 150ms antes de chamar renderCards().
  - [FIX-v77-HISTORY] history.pushState em renderLista/renderDetalhe + listener popstate:
    botão físico Voltar do Android navega detalhe→lista→login em vez de sair do portal.
  Correções v76:
  - [FIX-v76-LB-LOGIN] _lbSafeClose() agora chamado no início de renderLogin, renderExpirada
    e renderEsqueci — antes só era chamado em renderLista/renderDetalhe. Logout ou sessão
    expirada com lightbox aberto deixava body.overflow='hidden' travado permanentemente.
  - [FIX-v76-TOAST-DEDUP] (index.html) uxToast: verifica se último toast visível tem a
    mesma mensagem antes de criar novo elemento — evita pilha de toasts idênticos em erros rápidos.
  - [FIX-v76-SESS-CNPJ] sessao.cnpj na session bar agora exibido com maskCnpj() —
    antes mostrava os 14 dígitos brutos, inconsistente com r.cnpjCliente no detalhe.
  - [FIX-v76-PRIVACY] limparSessao() remove 'onlinees_ultimo_cnpj' do sessionStorage —
    antes o CNPJ do cliente anterior pré-preenchia o campo em dispositivos compartilhados.
  - [FIX-v76-IMG-LEAK] limparSessao() também desconecta _portalThumbObs e zera
    _portalImgCache — libera memória das fotos ao fazer logout sem passar pelo btnVoltar.
  Correções v75:
  - [FIX-v75-MASK-TEL-CC] maskTel(): remove prefixo "55" de números com 12/13 dígitos
    antes de formatar — WhatsApp armazenado como "5527..." agora exibe "(27) ..." corretamente.
  - [FIX-v75-SESS-NAME] .session-name: overflow:hidden + text-overflow:ellipsis + min-width:0
    no container flex — nomes de empresa longos não empurram mais o botão "Sair" para fora da tela.
  - [FIX-v75-INFO-XSS] opts.info em renderLogin: substituído innerHTML por esc() —
    eliminado vetor XSS latente caso algum dado de usuário fosse passado via opts.info no futuro.
  Correções v74:
  - [FIX-v74-LOGIN-FINALLY] tentarLogin: _loginEmAndamento e btnEntrar agora resetados em
    try/finally — antes, se fazerLogin lançasse exceção (ex: sha256 em HTTP), o botão ficava
    permanentemente desabilitado sem feedback ao usuário até recarregar a página.
  - [FIX-v74-SIG-OFFSCREEN] normalizarAssinaturaPNG: portado fix do index.html —
    loop pixel-a-pixel agora usa OffscreenCanvas + requestIdleCallback, não bloqueia
    o main thread no mobile durante geração de PDF com assinatura. Fallback para canvas
    DOM em iOS <16.4.
  - [FIX-v74-MASK-CNPJ] r.cnpjCliente exibido com máscara (XX.XXX.XXX/XXXX-XX) na tela
    de detalhe — antes exibia os dígitos brutos sem formatação.
  - [FIX-v74-MASK-TEL] maskTel(): nova função que formata telefone/WhatsApp brutos para
    (XX) XXXX-XXXX ou (XX) 9XXXX-XXXX. Aplicada em Telefone e WhatsApp no detalhe.
  - [FIX-v74-RL-CLEANUP] Limpeza de chaves RL expiradas no localStorage ao iniciar —
    evita acúmulo ilimitado de onlinees_rl_{cnpj} em dispositivos compartilhados.
  - [FIX-v74-BADGE-ACCENT] badge(): usa toLowerCase + includes em vez de === exato —
    suporta variações de acento ("Concluido" vs "Concluído") em RATs de versões antigas.
  Correções v73:
  - [FIX-v73-CRED-EXPIRED] fazerLogin: caminho de senha expirada também sanitiza cred antes de
    passar para renderExpirada — senhaHash vazava pela closure mesmo com fix v72 no caminho normal.
  - [FIX-v73-SESS-RESTORE-HASH] init() restauração de sessão: credSafeRestore sem senhaHash —
    o fix v72 só cobria o login normal; restauração de sessão passava cred completo do Firestore.
  - [FIX-v73-LB-NAV-LEAK] Lightbox: body.overflow='hidden' ficava preso se o usuário navegasse
    enquanto o lightbox estava aberto. _lbSafeClose() chamado no início de renderLista/renderDetalhe.
    lbClose() agora também reseta _lbImgs=[] e _lbIdx=0.
  - [FIX-v73-CHIP-SCOPE] Remoção de .active nos chips scoped para #statusChips em vez de
    document global — evita afetar outros elementos .filter-chip fora do container de status.
  - [FIX-v73-PDF-CACHE] addImagemReduzidaAoPdf no portal aceita parâmetro preDecoded (Image);
    loop gerarPDF usa _pdfImgCache com elementos Image prontos — elimina re-decode serial real.
  - [FIX-v73-CHIP-WRAP] white-space:nowrap nos chips de status; #statusChips com overflow-x:auto
    e scrollbar oculta — chips longos "Com pendência"/"Não concluído" não quebram em telas pequenas.
  - [FIX-v73-TITLE-SAFE] document.title sanitizado com regex antes de usar r.numero —
    evita chars especiais (|, —, <) comprometendo o título na aba/histórico do browser.
  Correções v72:
  - [FIX-v72-LAZY-FOTOS] Regressão v71: data-src no DOM colocava base64 em memória de qualquer forma.
    Imagens agora ficam em window._portalImgCache (array JS). DOM contém apenas data-idx numérico.
  - [FIX-v72-OBS-LEAK] IntersectionObserver guardado em window._portalThumbObs e desconectado
    explicitamente ao voltar para lista — impede referências a nós removidos do DOM.
  - [FIX-v72-DUPE-LISTENER] Listener de limpeza de erro do inputCnpj integrado ao handler de máscara
    — era duplicado (dois addEventListener('input') no mesmo elemento).
  - [FIX-v72-RL-PER-CNPJ] Rate limit migrado para per-CNPJ (chave 'onlinees_rl_{cnpj}') — evita
    que tentativas de um cliente bloqueiem outro cliente no mesmo browser.
  - [FIX-v72-DUPLO-LOGIN] Flag _loginEmAndamento impede chamadas concorrentes ao pressionar
    Enter durante "Verificando..." — segunda chamada ao Firebase era silenciosamente descartada.
  - [FIX-v72-SESS-HASH] sessao.cred agora é credSafe sem senhaHash — impede extração do hash
    por extensões maliciosas via window.sessao.cred.senhaHash.
  - [FIX-v72-RENOVAR-AUTH] renovarSenha() valida garantirAuth() antes de escrever no Firestore
    — impede geração de nova senha sem autenticação anônima estabelecida.
  - [FIX-v72-MAXLENGTH] Toggle mostrar/ocultar senha chama setAttribute('maxlength','6') após
    troca de type — reforça limite que alguns browsers ignoram ao mudar password → text.
  - [FIX-v72-TOGGLE-LABEL] Botões "Ver"/"Ocultar" agora atualizam o texto ao alternar estado.
  - [FIX-v72-ESQUECI-FRAME] renderEsqueci não mais redireciona para renderExpirada (que exibia
    "Senha expirada" mesmo com senha válida). Botões de renovação renderizados inline com
    framing neutro "Receber nova senha".
  - [FIX-v72-STATUS-CHIPS] Adicionados chips "Concluído com pendência" e "Não concluído" —
    RATs com esses status não apareciam em nenhum filtro antes.
  - [FIX-v72-ACOES-ARRAY] campo() e _formatVal() tratam r.acoes como array de strings
    (formato usado pelo index.html) — exibia "item1,item2" sem formatação antes.
  Correções v71:
  - [FIX-v71-RENOVAR-RACE] renderExpirada: desabilita TODOS os botões ao iniciar renovação de senha
    — evita race condition onde dois cliques simultâneos geram senhas diferentes, invalidando a 1ª.
  - [FIX-v71-DELETED-FALLBACK] buscarRats fallback: usa _deleted!==true (alinhado com FIX-v63 do index)
    — undefined!==true → RATs antigas sem campo _deleted passam corretamente no caminho sem índice.
  - [FIX-v71-SENHA-SPACES] fazerLogin: .replace(/\s/g,'') em vez de .trim() — remove espaços internos
    que causavam hash diferente do armazenado com mensagem genérica "Senha incorreta".
  - [FIX-v71-ESC-ASSINATURA] renderDetalhe: assinaturaCliente escapada com esc() no atributo src.
  - [FIX-v71-RL-PERSIST] Rate limit migrado para localStorage — não zera mais com F5/reload.
  - [FIX-v71-LAZY-FOTOS] Galeria de fotos usa IntersectionObserver — thumbs carregam só ao entrar
    na viewport, evitando carregamento de todos os data: URIs em memória de uma vez (OOM em mobile).
  - [FIX-v71-PDF-PARALLEL] Pre-decode de todas as imagens em paralelo antes do loop serial de layout.
  - [FIX-v71-LIMIT-WARN] Session bar avisa "(50 mais recentes)" quando rats.length >= 50.
  - [FIX-v71-FILTRO-CASE] Chips de status usam toLowerCase().trim() — "Concluído" ≠ "concluido" resolvido.
  - [FIX-v71-BUSCA-EXPAND] Campo de busca expandido: técnico, status e data além de número/equipamento/cliente.
  - [FIX-v71-SENHA-DISPLAY] Senha gerada exibida com toggle olho (oculta por padrão) — não exposta em plaintext.
  - [FIX-v71-TOGGLE-SENHA] Campo senha no login tem botão olho para mostrar/ocultar 6 dígitos no mobile.
  - [FIX-v71-CNPJ-CURSOR] Cursor do campo CNPJ reposicionado por contagem de dígitos — não pula mais.
  - [FIX-v71-ESQUECI-SELF] "Esqueci senha" tenta self-service se CNPJ já estiver preenchido.
  - [FIX-v71-SESS-RENEW] TTL da sessão estendido para 2h e renovado a cada navegação entre telas.
  - [FIX-v71-BTOA] Fallback PDF usa URL.createObjectURL(blob) — btoa() crashava com chars não-Latin1.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <title>Portal do Cliente — ONLINE-ES</title>

  <!-- ===== PWA ===== -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ONLINE-ES">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <meta name="msapplication-TileColor" content="#0f172a">
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .then(function (reg) { console.log('[SW] Registrado. Scope:', reg.scope); })
          .catch(function (err) { console.warn('[SW] Falha:', err); });
      });
    }
  </script>
  <!-- ===== /PWA ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    :root {
      --c0: #050a14;
      --c1: #080f1e;
      --c2: #0c1629;
      --c3: #111d35;
      --accent: #f97316;
      --accent2: #fb923c;
      --blue: #2563eb;
      --blue2: #3b82f6;
      --glow: rgba(249,115,22,.18);
      --glow2: rgba(37,99,235,.15);
      --text: #f0f4ff;
      --text2: #94a3b8;
      --text3: #64748b;
      --border: rgba(255,255,255,.07);
      --border2: rgba(249,115,22,.25);
      --radius: 18px;
      --r2: 12px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: var(--c0);
      font-family: var(--font-body);
      color: var(--text);
      font-size: 15px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BG grid/noise ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(249,115,22,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.03) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(37,99,235,.12) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 30% at 80% 80%, rgba(249,115,22,.07) 0%, transparent 60%);
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      height: 58px;
      background: rgba(5,10,20,.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
    }
    .topbar::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,.4), transparent);
    }
    .topbar-logo {
      width: 38px; height: 38px;
      background: #fff;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      padding: 3px;
    }
    .topbar-logo img { width: 100%; height: 100%; object-fit: contain; }
    .topbar-name {
      font-family: var(--font-display);
      font-weight: 700; font-size: .92rem;
      color: #fff; letter-spacing: .01em;
    }
    .topbar-sub { font-size: .68rem; color: var(--text3); font-weight: 400; margin-top: 1px; }
    .topbar-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── Wrap ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 520px; margin: 0 auto;
      padding: 32px 16px 80px;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, rgba(12,22,41,.95), rgba(8,15,30,.98));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,.5), transparent);
    }
    .card-glow {
      position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(249,115,22,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .card h2 {
      font-family: var(--font-display);
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 10px;
      color: #fff;
    }
    .card h2 .icon-wrap {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, rgba(249,115,22,.2), rgba(249,115,22,.05));
      border: 1px solid rgba(249,115,22,.3);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 1rem; flex-shrink: 0;
    }

    /* ── Login hero ── */
    .login-hero {
      text-align: center; padding: 36px 0 24px;
    }
    .login-logo-wrap {
      width: 80px; height: 80px;
      background: #fff;
      border-radius: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      padding: 8px;
      box-shadow: 0 0 0 1px rgba(249,115,22,.2), 0 20px 60px rgba(249,115,22,.12), 0 4px 20px rgba(0,0,0,.4);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .login-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.55rem; font-weight: 800;
      color: #fff; line-height: 1.15;
      margin-bottom: 6px;
      letter-spacing: -.01em;
    }
    .login-title span { color: var(--accent); }
    .login-sub {
      font-size: .82rem; color: var(--text2);
      font-weight: 400; line-height: 1.5;
    }
    .login-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25);
      border-radius: 999px; padding: 4px 12px;
      font-size: .7rem; color: #4ade80; font-weight: 600;
      margin-top: 12px;
    }
    .login-badge i { font-size: .8rem; }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: .68rem; font-weight: 600;
      color: var(--text3); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: .07em;
    }
    .field-inner { position: relative; }
    .field-inner i.field-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); font-size: 1rem;
      pointer-events: none; transition: color .2s;
    }
    .field-inner input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: var(--r2);
      font-size: 15px; font-family: var(--font-body);
      color: #fff; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    .field-inner input::placeholder { color: var(--text3); }
    .field-inner input:focus {
      border-color: rgba(249,115,22,.6);
      background: rgba(249,115,22,.04);
      box-shadow: 0 0 0 3px rgba(249,115,22,.1), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .field-inner input:focus ~ .field-icon,
    .field-inner:focus-within i.field-icon { color: var(--accent); }

    /* ── Botões ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff; border: none;
      border-radius: var(--r2);
      font-size: .95rem; font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: all .2s; margin-top: 6px;
      min-height: 50px; letter-spacing: .01em;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(249,115,22,.3);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      transition: left .4s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(249,115,22,.45); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      width: 100%; padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--r2);
      font-size: .82rem; font-weight: 500;
      color: var(--text2); font-family: var(--font-body);
      cursor: pointer; margin-top: 10px;
      transition: border-color .2s, color .2s, background .2s;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-ghost:hover { border-color: rgba(249,115,22,.4); color: var(--accent); background: rgba(249,115,22,.04); }

    /* ── Mensagens ── */
    .msg-error {
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: var(--r2);
      color: #fca5a5; font-size: .82rem;
      padding: 10px 14px; margin-bottom: 14px;
      display: none; line-height: 1.5;
    }
    .msg-info {
      background: rgba(249,115,22,.08);
      border: 1px solid rgba(249,115,22,.25);
      border-radius: var(--r2); color: #fdba74;
      font-size: .82rem; padding: 10px 14px;
      margin-bottom: 14px; line-height: 1.5;
    }
    .msg-hint {
      background: rgba(37,99,235,.08);
      border: 1px solid rgba(37,99,235,.2);
      border-radius: var(--r2); color: #93c5fd;
      font-size: .78rem; padding: 9px 13px;
      margin-bottom: 14px; line-height: 1.6;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .msg-hint i { font-size: .9rem; margin-top: 1px; flex-shrink: 0; }

    /* ── Info card (how-to) ── */
    .how-card {
      background: rgba(8,15,30,.6);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }
    .how-title {
      font-family: var(--font-display);
      font-size: .78rem; font-weight: 700;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px;
    }
    .how-title i { color: var(--accent); font-size: .9rem; }
    .how-step {
      display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 11px; font-size: .81rem; color: var(--text2); line-height: 1.5;
    }
    .how-step:last-child { margin-bottom: 0; }
    .how-num {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, rgba(249,115,22,.2), rgba(249,115,22,.05));
      border: 1px solid rgba(249,115,22,.25);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; color: var(--accent);
      flex-shrink: 0; margin-top: 1px;
      font-family: var(--font-display);
    }

    /* ── Session bar ── */
    .session-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 18px; gap: 10px;
      background: rgba(8,15,30,.7);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
    }
    .session-name {
      font-family: var(--font-display);
      font-size: .92rem; font-weight: 700; color: #fff;
      /* [FIX-v75-SESS-NAME] Trunca nomes longos — evita empurrar botão "Sair" para fora da tela */
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .session-cnpj { font-size: .72rem; color: var(--text3); margin-top: 2px; }
    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 99px;
      font-size: .73rem; font-weight: 600; color: var(--text2);
      font-family: var(--font-body); cursor: pointer;
      transition: all .18s; min-height: 36px; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-logout:hover { border-color: rgba(220,38,38,.5); color: #f87171; background: rgba(220,38,38,.06); }

    /* ── Seção título ── */
    .section-label {
      font-size: .68rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .09em;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── RAT cards ── */
    .rat-card {
      background: linear-gradient(145deg, rgba(12,22,41,.9), rgba(8,15,30,.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px; margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    .rat-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--accent), transparent);
      opacity: 0; transition: opacity .2s;
      border-radius: 16px 0 0 16px;
    }
    .rat-card:hover { border-color: rgba(249,115,22,.35); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
    .rat-card:hover::before { opacity: 1; }
    .rat-card:active { transform: scale(.99); }
    .rat-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .rat-num {
      font-family: var(--font-display);
      font-size: .88rem; font-weight: 700; color: #fff;
      word-break: break-all;
    }
    .rat-meta { font-size: .7rem; color: var(--text3); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 10px; }
    .rat-meta span { display: flex; align-items: center; gap: 4px; }
    .badge {
      font-size: .62rem; font-weight: 700; padding: 4px 10px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
      letter-spacing: .03em;
    }
    .badge-ok { background: rgba(34,197,94,.12); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
    .badge-warn { background: rgba(234,179,8,.1); color: #fbbf24; border: 1px solid rgba(234,179,8,.25); }
    .badge-bad { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .rat-arrow {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3); font-size: .9rem;
      transition: color .2s, transform .2s;
    }
    .rat-card:hover .rat-arrow { color: var(--accent); transform: translateY(-50%) translateX(3px); }

    /* ── Detalhe ── */
    .back-bar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
    }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 15px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .78rem; font-weight: 600; color: var(--text2);
      font-family: var(--font-body); cursor: pointer;
      transition: all .18s; flex-shrink: 0; min-height: 40px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { background: rgba(255,255,255,.08); color: #fff; }
    .back-title {
      font-family: var(--font-display);
      font-size: .9rem; font-weight: 700; color: #fff;
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Campo detalhe ── */
    .campo { margin-bottom: 14px; }
    .campo-label {
      font-size: .62rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px;
    }
    .campo-valor {
      font-size: .86rem; color: var(--text);
      line-height: 1.6; word-break: break-word;
      white-space: pre-wrap;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Seção ── */
    .sec-head {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-display);
      font-size: .75rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .08em;
      margin: 18px 0 12px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(249,115,22,.15);
    }

    /* ── Botão PDF ── */
    .btn-pdf {
      width: 100%; padding: 14px 20px;
      background: rgba(37,99,235,.12);
      border: 1px solid rgba(37,99,235,.3);
      border-radius: var(--r2);
      color: #93c5fd; font-size: .9rem; font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: all .2s; margin-top: 10px; min-height: 50px;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pdf:hover {
      background: rgba(37,99,235,.22);
      border-color: rgba(59,130,246,.5);
      color: #bfdbfe;
      box-shadow: 0 4px 20px rgba(37,99,235,.2);
    }
    .btn-pdf:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Loading ── */
    .loading {
      text-align: center; color: var(--text3);
      padding: 60px 0; font-size: .88rem;
    }
    .loading-icon {
      width: 50px; height: 50px;
      border: 2px solid rgba(249,115,22,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; display: inline-block; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(12,22,41,.96);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border2);
      color: #fff; padding: 12px 22px;
      border-radius: 999px; font-size: .82rem; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 9999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; max-width: 90vw;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    .footer {
      text-align: center; font-size: .67rem; color: var(--text3);
      margin-top: 24px; padding-bottom: 8px;
      letter-spacing: .03em;
    }

    /* ── Animações de entrada ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: fadeUp .5s ease both; }
    .anim-2 { animation: fadeUp .5s .08s ease both; }
    .anim-3 { animation: fadeUp .5s .16s ease both; }
    .anim-4 { animation: fadeUp .5s .24s ease both; }

    /* ── Botão WhatsApp ── */
    .btn-compartilhar {
      width: 100%; padding: 13px 20px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.35);
      border-radius: var(--r2);
      color: #a5b4fc; font-size: .9rem; font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: all .2s; margin-top: 10px; min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-compartilhar:hover {
      background: rgba(99,102,241,.22);
      border-color: rgba(129,140,248,.55);
      box-shadow: 0 4px 16px rgba(99,102,241,.25);
    }

    /* ── Trust card ── */
    .trust-card {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center;
      background: rgba(8,15,30,.5);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 14px;
      font-size: .72rem; color: var(--text3);
    }
    .trust-card span { display: flex; align-items: center; gap: 5px; }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-card { height: 80px; border-radius: 16px; margin-bottom: 10px; }
    .skel-header { height: 56px; border-radius: 14px; margin-bottom: 18px; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    /* [FIX-v73-CHIP-SCROLL] Barra de chips de status rola horizontalmente em telas muito pequenas */
    #statusChips {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    #statusChips::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px; border-radius: 999px;
      font-size: .72rem; font-weight: 600;
      border: 1px solid var(--border); cursor: pointer;
      background: transparent; color: var(--text3);
      transition: all .18s; font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap; /* [FIX-v73-CHIP-WRAP] Evita quebra interna em telas pequenas */
    }
    .filter-chip.active {
      background: rgba(249,115,22,.12);
      border-color: rgba(249,115,22,.35);
      color: var(--accent);
    }
    .search-field {
      flex: 1; min-width: 140px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px 6px 34px;
      font-size: .78rem; color: #fff;
      font-family: var(--font-body); outline: none;
      transition: border-color .2s;
    }
    .search-field:focus { border-color: rgba(249,115,22,.4); }
    .search-wrap { position: relative; flex: 1; min-width: 140px; }
    .search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .85rem; pointer-events: none; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text3);
    }
    .empty-state i { font-size: 2.8rem; display: block; margin-bottom: 12px; opacity: .5; }
    .empty-state p { font-size: .85rem; line-height: 1.6; }

    /* ── Inline error state ── */
    .error-state {
      text-align: center; padding: 40px 24px;
    }
    .error-state i { font-size: 2.4rem; color: var(--text3); display: block; margin-bottom: 12px; }
    .error-state p { color: var(--text2); font-size: .88rem; margin-bottom: 20px; line-height: 1.6; }

    /* ── Assinatura visível ── */
    .sig-box {
      background: #fff; border-radius: 8px;
      padding: 8px; display: inline-block;
      margin-top: 8px;
    }
    .sig-box img { max-width: 180px; display: block; }

    /* ── Galeria de fotos inline ── */
    .foto-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-top: 10px;
    }
    .foto-thumb {
      aspect-ratio: 1;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      cursor: zoom-in;
      border: 1px solid var(--border);
      transition: transform .18s, box-shadow .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .foto-thumb:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,.4); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,.92);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      animation: fadeIn .2s ease;
    }
    #lightbox.hidden { display: none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    #lightbox img {
      max-width: 94vw; max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      object-fit: contain;
    }
    .lb-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: #fff; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,.1);
      border: none; border-radius: 50%;
      color: #fff; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); transition: background .15s;
    }
    .lb-prev { left: 12px; }
    .lb-next { right: 12px; }
    .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,.2); }
    .lb-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: .78rem; color: rgba(255,255,255,.6); font-weight: 500;
    }

    /* ── Botão mapa ── */
    .btn-mapa {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 11px 16px;
      background: rgba(37,99,235,.08);
      border: 1px solid rgba(37,99,235,.2);
      border-radius: var(--r2);
      color: #93c5fd; font-size: .83rem; font-weight: 600;
      text-decoration: none; margin-top: 10px;
      transition: background .18s, border-color .18s;
    }
    .btn-mapa:hover { background: rgba(37,99,235,.15); border-color: rgba(59,130,246,.4); }

    /* ── Timeline de status ── */
    .timeline {
      display: flex; align-items: flex-start;
      justify-content: center;
      margin-bottom: 16px;
      padding: 18px 16px;
      background: linear-gradient(145deg, rgba(12,22,41,.9), rgba(8,15,30,.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      animation: fadeUp .45s .04s ease both;
    }
    .tl-step {
      display: flex; flex-direction: column;
      align-items: center; flex: 1;
      position: relative; z-index: 1;
    }
    .tl-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; color: var(--text3);
      transition: all .3s; position: relative; z-index: 2;
      margin-bottom: 8px;
    }
    .tl-step.done .tl-icon {
      background: rgba(34,197,94,.15);
      border-color: rgba(34,197,94,.4);
      color: #4ade80;
    }
    .tl-step.current .tl-icon {
      background: rgba(249,115,22,.18);
      border-color: rgba(249,115,22,.5);
      color: var(--accent);
      box-shadow: 0 0 16px rgba(249,115,22,.25);
    }
    .tl-label {
      font-size: .65rem; font-weight: 600;
      color: var(--text3); text-align: center;
      letter-spacing: .02em;
    }
    .tl-step.done .tl-label { color: #4ade80; }
    .tl-step.current .tl-label { color: var(--accent); }
    .tl-line {
      position: absolute; top: 18px; left: 60%; right: -40%;
      height: 1.5px;
      background: rgba(255,255,255,.1);
      z-index: 0;
    }
    .tl-line.done { background: rgba(34,197,94,.4); }

    /* [FIX-PORTAL-PERF] Desabilita efeitos pesados em dispositivos fracos */
    @media (max-width: 480px) {
      .card, .topbar, .how-card, .session-bar, .trust-card, .rat-card, .timeline {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      body::before, body::after { display: none; }
    }
    /* [FIX-PORTAL-A11Y] Respeita preferência de movimento reduzido */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media (max-width: 600px) {
      .wrap { padding: 20px 12px 80px; }
      .card { padding: 22px 18px; }
      .login-hero { padding: 24px 0 18px; }
      .login-title { font-size: 1.3rem; }
    }
    @media (max-width: 380px) {
      .wrap { padding: 16px 10px 80px; }
      .card { padding: 18px 14px; }
    }
    .topbar { padding-top: max(0px, env(safe-area-inset-top, 0px)); height: calc(58px + env(safe-area-inset-top, 0px)); }
    .wrap { padding-bottom: max(80px, calc(env(safe-area-inset-bottom, 0px) + 80px)); }
  </style>
</head>
<body>

<!-- Topbar -->

   index.html v89 migrou para PBKDF2/SHA-256 com 100.000 iterações e salt único.
   portal.html mantém SHA-256 como fallback para credenciais antigas (sem senhaSalt).
   Novas senhas geradas pelo portal também usam PBKDF2 para consistência. */
async function _portalGerarSalt(){
  const arr=new Uint8Array(16);crypto.getRandomValues(arr);
  return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function _portalHashSenha(plain,salt){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(plain),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(salt),iterations:100000,hash:'SHA-256'},key,256);
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function _portalVerificarSenha(plain,cred){
  if(cred.senhaSalt){
    const h=await _portalHashSenha(String(plain||'').trim(),cred.senhaSalt);
    return h===cred.senhaHash;
  }
  // Legado: SHA-256 simples (credenciais criadas antes do v89)
  const h2=await sha256(String(plain||'').trim());
  return h2===cred.senhaHash;
}
async function sha256(str){

}

function maskCnpj(v){
  v=v.replace(/\D/g,'').slice(0,14);
  if(v.length<=11)return v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}
// [FIX-v74-MASK-TEL] Formata telefone/WhatsApp com dígitos brutos → (XX) XXXX-XXXX ou (XX) 9XXXX-XXXX
// [FIX-v75-MASK-TEL-CC] Suporta 13 dígitos com código de país 55 (ex: "5527999990000")
function maskTel(v){
  if(!v)return v;
  var d=String(v).replace(/\D/g,'');
  // Remove prefixo 55 se tiver 12 ou 13 dígitos (formato de envio WhatsApp)
  if((d.length===12||d.length===13)&&d.startsWith('55'))d=d.slice(2);
  if(d.length===11)return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  if(d.length===10)return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return v; // não reconhecido — retorna original
}
// [FIX-v74-BADGE-ACCENT] Usa toLowerCase/includes — suporta "Concluido" (sem acento) de RATs antigas
function badge(s){
  const sl=(s||'').toLowerCase();
  const cls=!s?'badge-bad'
    :sl.includes('pendência')||sl.includes('pendencia')?'badge-warn'
    :sl.includes('conclu')?'badge-ok'
    :'badge-bad';
  return`<span class="badge ${cls}">${esc(s||'Indefinido')}</span>`;
}

let _lbImgs=[],_lbIdx=0;
function lbOpen(imgs,idx){
  _lbImgs=imgs;_lbIdx=idx;
  _lbUpdate();
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function lbClose(){
  document.getElementById('lightbox').classList.add('hidden');
  document.body.style.overflow='';
  _lbImgs=[];_lbIdx=0; // reset state
}
// [FIX-v73-LB-NAV-LEAK] Fecha lightbox automaticamente em qualquer re-renderização
// Evita body.overflow='hidden' preso se o usuário navegar enquanto lightbox estiver aberto
function _lbSafeClose(){
  const lb=document.getElementById('lightbox');
  if(lb&&!lb.classList.contains('hidden'))lbClose();
}
function _lbUpdate(){
  document.getElementById('lbImg').src=_lbImgs[_lbIdx];
  document.getElementById('lbCounter').textContent=(_lbIdx+1)+' / '+_lbImgs.length;
}
document.getElementById('lbClose').addEventListener('click',lbClose);
document.getElementById('lbPrev').addEventListener('click',()=>{_lbIdx=(_lbIdx-1+_lbImgs.length)%_lbImgs.length;_lbUpdate();});
document.getElementById('lbNext').addEventListener('click',()=>{_lbIdx=(_lbIdx+1)%_lbImgs.length;_lbUpdate();});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')lbClose();});
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');if(lb.classList.contains('hidden'))return;
  if(e.key==='Escape')lbClose();
  if(e.key==='ArrowLeft'){_lbIdx=(_lbIdx-1+_lbImgs.length)%_lbImgs.length;_lbUpdate();}
  if(e.key==='ArrowRight'){_lbIdx=(_lbIdx+1)%_lbImgs.length;_lbUpdate();}
});
// Swipe touch support
(function(){let sx=0;
  document.getElementById('lightbox').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  document.getElementById('lightbox').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>50){_lbIdx=dx<0?(_lbIdx+1)%_lbImgs.length:(_lbIdx-1+_lbImgs.length)%_lbImgs.length;_lbUpdate();}
  },{passive:true});
})();

/* rate limit — [FIX-v71-RL-PERSIST] persiste no localStorage para sobreviver a reloads
   [FIX-v72-RL-PER-CNPJ] per-CNPJ — evita que cliente A bloqueie cliente B no mesmo browser */
function _rlKey(cnpj){return 'onlinees_rl_'+(cnpj||'_global');}
function _rlLoad(cnpj){try{const d=JSON.parse(localStorage.getItem(_rlKey(cnpj))||'{}');return{count:d.count||0,resetAt:d.resetAt||0};}catch{return{count:0,resetAt:0};}}
function _rlSave(cnpj,o){try{localStorage.setItem(_rlKey(cnpj),JSON.stringify(o));}catch{}}
function checkRL(cnpj){
  const now=Date.now(),o=_rlLoad(cnpj);
  if(now>o.resetAt){o.count=0;o.resetAt=now+120000;}
  o.count++;_rlSave(cnpj,o);
  if(o.count>5){const s=Math.ceil((o.resetAt-now)/1000);return{bloqueado:true,msg:`Muitas tentativas. Aguarde ${s}s.`};}
  return{bloqueado:false};
}
function resetRL(cnpj){_rlSave(cnpj,{count:0,resetAt:0});}
// [FIX-v74-RL-CLEANUP] Remove chaves RL expiradas do localStorage — evita acúmulo em dispositivos compartilhados
function _rlCleanup(){
  try{
    var now=Date.now();
    var toRemove=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith('onlinees_rl_')){
        try{var d=JSON.parse(localStorage.getItem(k)||'{}');if(!d.resetAt||now>d.resetAt+300000)toRemove.push(k);}catch{toRemove.push(k);}
      }
    }
    toRemove.forEach(function(k){localStorage.removeItem(k);});
  }catch{}
}
// Executa limpeza na inicialização (idle, sem bloquear)
if(typeof requestIdleCallback!=='undefined'){requestIdleCallback(_rlCleanup);}
else{setTimeout(_rlCleanup,2000);}

async function fazerLogin(cnpjRaw,senhaRaw){
  // [FIX-v71-SENHA-SPACES] Remove todos os espaços/whitespace internos e bordas antes de validar
  // Evita que senha "1 2 3 4 5 6" (digitada com espaço acidental) gere hash diferente com erro genérico
  const cnpj=normCnpj(cnpjRaw),senha=String(senhaRaw??'').replace(/\s/g,'');
  if(cnpj.length<8)return{ok:false,msg:'CNPJ ou CPF inválido.'};
  if(senha.length<6)return{ok:false,msg:'A senha deve ter 6 dígitos.'};
  const rl=checkRL(cnpj);if(rl.bloqueado)return{ok:false,msg:rl.msg};
  if(!await garantirAuth())return{ok:false,msg:'Sem conexão com o servidor. Tente novamente.'};
  let snap;
  try{
    snap=await Promise.race([
      db.collection('onlineEsPortalClientes').doc(cnpj).get(),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),12000))
    ]);
  }catch(e){
    if(e.message==='timeout')return{ok:false,msg:'Tempo de resposta excedido.'};
    if(e.code==='permission-denied')return{ok:false,msg:'Acesso negado.'};
    return{ok:false,msg:'Erro de conexão.'};
  }
  if(!snap.exists)return{ok:false,msg:'CNPJ/CPF não cadastrado. Solicite o acesso ao técnico.'};
  const cred=snap.data();
  if(cred.ativo===false)return{ok:false,msg:'Acesso desativado. Contate a ONLINE-ES.'};
  const agora=new Date(),expira=cred.expiradoEm?new Date(cred.expiradoEm):new Date(0);
  if(agora>expira){
    // [FIX-v73-CRED-EXPIRED] Sanitiza cred antes de passar para renderExpirada — evita senhaHash em closure
    const credExp={expiradoEm:cred.expiradoEm,ativo:cred.ativo,nome:cred.nome,emails:cred.emails,whatsapps:cred.whatsapps};
    return{ok:false,expirada:true,cnpj,cred:credExp};
  }
  // [FIX-portal-v78-PBKDF2] Verifica com PBKDF2 (novo) ou SHA-256 legado
  const _senhaOk=await _portalVerificarSenha(senha,cred);
  if(!_senhaOk)return{ok:false,msg:'Senha incorreta. Use os 6 dígitos enviados pelo técnico.'};
  resetRL(cnpj);
  // [FIX-v72-SESS-HASH] Remove senhaHash e campos sensíveis do objeto em memória
  // Evita que extensões maliciosas ou XSS extraiam o hash via window.sessao.cred
  const credSafe={expiradoEm:cred.expiradoEm,ativo:cred.ativo,nome:cred.nome,emails:cred.emails,whatsapps:cred.whatsapps};
  sessao={cnpj,nome:cred.nome||cnpj,cred:credSafe};
  salvarSessao(sessao);
  try{db.collection('onlineEsPortalClientes').doc(cnpj).update({ultimoAcesso:agora.toISOString()});}catch{}
  return{ok:true};
}

/* buscar RATs */
/* Formata dígitos em CNPJ (XX.XXX.XXX/XXXX-XX) ou CPF (XXX.XXX.XXX-XX) */
function _fmtCnpjPortal(v){
  const d=String(v||'').replace(/\D/g,'');
  if(d.length===14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  if(d.length===11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  return v; // retorna original se não conseguir formatar
}

async function buscarRats(cnpj){
  // [FIX-v80-CNPJ] cnpj aqui já é só dígitos (normCnpj aplicado em fazerLogin)
  // RATs novas (index.html v91c+) salvam cnpjCliente só com dígitos → match direto
  // RATs antigas podem ter CNPJ com máscara → segunda query com formato mascarado
  const TO=ms=>new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms));
  const cnpjMascarado=_fmtCnpjPortal(cnpj);
  const cnpjsParaBuscar=[cnpj]; // sempre busca digits-only
  if(cnpjMascarado!==cnpj) cnpjsParaBuscar.push(cnpjMascarado); // também busca com máscara (RATs antigas)
  try{
    const arr=[];
    const idsVistos=new Set();
    for(const c of cnpjsParaBuscar){
      let snap;
      try{snap=await Promise.race([db.collection('onlineEsRelatorios').where('cnpjCliente','==',c).where('_deleted','==',false).orderBy('dataHoraIso','desc').limit(50).get(),TO(15000)]);}
      // [FIX-v71-DELETED-FALLBACK] Caminho sem índice
      catch(e){if(e.message==='timeout')throw e;snap=await Promise.race([db.collection('onlineEsRelatorios').where('cnpjCliente','==',c).limit(80).get(),TO(15000)]);}
      snap.forEach(d=>{
        if(idsVistos.has(d.id))return; // evita duplicatas quando digits==masked
        idsVistos.add(d.id);
        const r=d.data();r._id=d.id;
        if(r._deleted!==true)arr.push(r);
      });
    }
    arr.sort((a,b)=>(b.dataHoraIso||'').localeCompare(a.dataHoraIso||''));return arr.slice(0,50);
  }catch(e){console.warn('[Portal]',e.message);return null;}
}

async function renderExpirada(cnpj,cred){
  _lbSafeClose(); // [FIX-v76-LB-LOGIN]
  el().innerHTML=`

      <div class="card-glow"></div>

      <div class="msg-info">Sua senha expirou. Escolha como receber uma nova senha.</div>
      <div id="expErr" class="msg-error"></div>
      <div id="expAcoes"></div>
      <button class="btn-ghost" id="btnVoltarExp" style="margin-top:12px;"><i class="ri-arrow-left-line"></i> Voltar ao login</button>
    </div>`;

  if(!history.state||history.state.portal!=='lista'){history.pushState({portal:'lista'},'','');}
  document.title='Meus Relatórios — Portal ONLINE-ES';
  // [FIX-v71-SESS-RENEW] Renova TTL da sessão a cada navegação
  if(sessao)salvarSessao(sessao);

  const rats=await buscarRats(sessao.cnpj);

    let filtrados=rats.filter(r=>{

      const statusR=(r.status||'').toLowerCase().trim();
      const matchStatus=filtroStatus==='todos'||statusR===(filtroStatus.toLowerCase().trim());
      // [FIX-v71-BUSCA-EXPAND] Busca agora inclui técnico, data e status além dos campos originais
      const matchBusca=!termoBusca||
        (r.numero||'').toLowerCase().includes(termoBusca)||

        (r.status||'').toLowerCase().includes(termoBusca)||
        (r.dataHoraIso||r.dataHora||'').toLowerCase().includes(termoBusca);
      return matchStatus&&matchBusca;
    });
    if(!filtrados.length){
      lista.innerHTML=`<div class="empty-state"><i class="ri-file-search-line"></i><p>Nenhum relatório encontrado para este filtro.</p></div>`;return;

        if(rat)renderDetalhe(rat);
      });

  let html=`

      <!-- [FIX-v75-SESS-NAME] min-width:0 necessário para flex item truncar com text-overflow -->

    </div>

      <button class="filter-chip" data-status="Concluído com pendência">Com pendência</button>
      <button class="filter-chip" data-status="Pendente">Pendente</button>
      <button class="filter-chip" data-status="Não concluído">Não concluído</button>
    </div>
    <div class="section-label anim-2"><i class="ri-file-list-3-line"></i> Relatórios</div>
    <div id="listaRats"></div>`;

  if(!rats.length){
    html+=`<div class="empty-state anim-2"><i class="ri-file-search-line"></i><p>Nenhum relatório disponível no momento.<br>Aguarde o técnico registrar o atendimento.</p></div>`;
  }
  el().innerHTML=html;
  renderCards();

  document.getElementById('btnSair')?.addEventListener('click',()=>{sessao=null;limparSessao();renderLogin();});
  // [FIX-v77-SEARCH-DEBOUNCE] Debounce de 150ms — evita renderCards a cada tecla pressionada
  let _buscaTimer=null;
  document.getElementById('inputBusca')?.addEventListener('input',e=>{
    clearTimeout(_buscaTimer);
    _buscaTimer=setTimeout(()=>{termoBusca=e.target.value.toLowerCase().trim();renderCards();},150);
  });
  document.getElementById('statusChips')?.querySelectorAll('.filter-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      filtroStatus=chip.getAttribute('data-status');

      document.getElementById('statusChips')?.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');

    });
  });
}

/* ── render detalhe ── */
function renderDetalhe(r){

  history.pushState({portal:'detalhe',ratId:r._id||''},'','');
  // [FIX-v73-TITLE-SAFE] Sanitiza r.numero para evitar chars especiais no título da aba
  const _safeNum=(r.numero||'RAT').replace(/[^\w\d\s\-\.\/]/g,'').slice(0,40);
  document.title=`${_safeNum} — Portal ONLINE-ES`;
  // [FIX-IOS-SHARE] Pré-carrega jsPDF em background ao abrir o detalhe.
  // navigator.share no iOS Safari só funciona dentro de um user gesture SÍNCRONO.
  // Se jsPDF ainda não está em cache, o await _ensureJsPDF() dentro do clique
  // faz fetch da CDN (~300ms) e o iOS considera o gesture expirado, rejeitando o share.
  // Pré-carregando aqui, o await no clique resolve instantaneamente do cache.
  try { _ensureJsPDF(); } catch(e) {}
  // [FIX-v72-ACOES-ARRAY] campo suporta array (r.acoes é array de strings no index.html)
  const _formatVal=v=>{
    if(v===null||v===undefined||v==='')return null;
    if(Array.isArray(v))return v.filter(Boolean).map(a=>'• '+a).join('\n')||null;
    return String(v);
  };
  const campo=(label,val)=>{const fv=_formatVal(val);if(!fv)return'';return`<div class="campo"><div class="campo-label">${label}</div><div class="campo-valor">${esc(fv)}</div></div>`;};

  const endFull=[r.endereco,r.bairro,r.cidade,r.uf].filter(Boolean).join(', ');

  // Timeline de status
  const etapas=[
    {key:'aberto',label:'Aberto',icon:'ri-file-add-line'},

  const statusLower=(r.status||'').toLowerCase();
  let etapaAtual=0;
  if(statusLower.includes('andamento'))etapaAtual=1;
  else if(statusLower.includes('conclu'))etapaAtual=2;
  const timelineHtml=`
    <div class="timeline">
      ${etapas.map((e,i)=>`
        <div class="tl-step ${i<=etapaAtual?'done':''}${i===etapaAtual?' current':''}">
          <div class="tl-icon"><i class="${e.icon}"></i></div>
          <div class="tl-label">${e.label}</div>
          ${i<etapas.length-1?'<div class="tl-line '+(i<etapaAtual?'done':'')+'"></div>':''}
        </div>`).join('')}
    </div>`;

  el().innerHTML=`
    <div class="back-bar anim-1">
      <button class="btn-back" id="btnVoltar"><i class="ri-arrow-left-s-line"></i> Voltar</button>
      <div class="back-title">${esc(r.numero||'Relatório')}</div>
      ${badge(r.status)}
    </div>
    ${timelineHtml}
    <div class="card anim-2">
      <div class="card-glow"></div>
      <h2><span class="icon-wrap"><i class="ri-file-text-line"></i></span> Detalhes do Atendimento</h2>
      <div class="sec-head"><i class="ri-user-3-line"></i> Dados do Atendimento</div>
      ${campo('Número RAT', r.numero)}
      ${campo('Data / Hora', dataBR(r.dataHoraIso||r.dataHora))}
      ${campo('Status', r.status)}
      ${campo('Técnico', r.tecnico)}
      <div class="sec-head"><i class="ri-building-2-line"></i> Dados do Cliente</div>

/* ── lazy jsPDF ── carrega em SÉRIE: jsPDF primeiro, autotable depois ── */
var _jspdfPromise=null;
function _ensureJsPDF(){
  if(_jspdfPromise)return _jspdfPromise;
  _jspdfPromise=new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF){resolve();return;}
    // [FIX-PORTAL-PDF] Scripts carregados em série — autotable depende do jsPDF já estar presente.
    // Carregamento paralelo (forEach) causava "doc.autoTable is not a function" quando
    // autotable finalizava antes do jsPDF estar disponível no escopo global.
    var urls=[
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js'
    ];
    var fallbacks=[
      'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js',
      'https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js'
    ];
    // [FIX-PORTAL-PDF-TIMEOUT] Timeout de 15s — evita botão PDF travado para sempre
    var _pdfPortalTimeout=setTimeout(function(){_jspdfPromise=null;reject(new Error('jsPDF não carregou em 15s. Verifique sua conexão.'));},15000);
    function carregarProximo(i){
      if(i>=urls.length){clearTimeout(_pdfPortalTimeout);resolve();return;}
      var s=document.createElement('script');
      s.src=urls[i];
      s.onload=function(){carregarProximo(i+1);};
      s.onerror=function(){
        var fb=document.createElement('script');
        fb.src=fallbacks[i];
        fb.onload=function(){carregarProximo(i+1);};
        fb.onerror=function(){clearTimeout(_pdfPortalTimeout);_jspdfPromise=null;reject(new Error('jsPDF não carregou (script '+i+')'));};
        document.head.appendChild(fb);
      };
      document.head.appendChild(s);
    }
    carregarProximo(0);
  });
  return _jspdfPromise;
}

async function normalizarAssinaturaPNG(dataUrl,targetW,targetH){

  if(r.assinaturaCliente){const sn=await normalizarAssinaturaPNG(r.assinaturaCliente,SIG_NORM_W,SIG_NORM_H);if(sn)try{doc.addImage(sn,'PNG',20+(70-SIG_W)/2,topoAssY,SIG_W,SIG_H);}catch{}}
  if(r.assinaturaTecnicoImg){const sn=await normalizarAssinaturaPNG(r.assinaturaTecnicoImg,SIG_NORM_W,SIG_NORM_H);if(sn)try{doc.addImage(sn,'PNG',120+(70-SIG_W)/2,topoAssY,SIG_W,SIG_H);}catch{}}
  const linhaY=topoAssY+28+2;
  doc.setDrawColor(148,163,184);doc.line(20,linhaY,90,linhaY);const mC=(20+90)/2;
  if(r.nomeAssinaturaCliente){doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text(r.nomeAssinaturaCliente,mC,linhaY+6,{align:'center'});}
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text(r.cliente||'Cliente',mC,linhaY+12,{align:'center'});
  const mT=(120+190)/2;doc.setDrawColor(148,163,184);doc.line(120,linhaY,190,linhaY);
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text(nomeTecPdf,mT,linhaY+6,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text('Técnico',mT,linhaY+12,{align:'center'});
  doc.setFontSize(7);doc.text('Gerado em '+agoraBR(),mT,linhaY+18,{align:'center'});
  const pc=doc.internal.getNumberOfPages();
  for(let i=1;i<=pc;i++){doc.setPage(i);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(15,23,42);doc.setDrawColor(148,163,184);doc.setLineWidth(0.3);doc.line(20,283,190,283);doc.text('ONLINE-ES Eletroeletrônica - www.onlinees.com.br - CNPJ 34.740.527/0001-74',105,287,{align:'center'});doc.text('Rua Maria Lourdes Garcia 176, Ilha de Santa Maria, Vitória - Cep 29.051-250',105,292,{align:'center'});doc.text('Página '+i+'/'+pc,105,296,{align:'center'});}
  const nomeArq='relatorio-'+(r.numero||r._id||'online').replace(/[^a-zA-Z0-9\-_]/g,'_')+'.pdf';
  const blob=doc.output('blob');

  // Modo retornarBlob: usado pelo botão Compartilhar — não baixa, só devolve o File
  if(retornarBlob){
    return new File([blob], nomeArq, {type:'application/pdf'});
  }

  // Baixar normalmente
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=nomeArq;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},3000);
    toast('✅ PDF baixado com sucesso!',3000);
  }catch(blobErr){
    // Fallback: abrir como data URI em nova aba (iOS)
    try{
      const dataUri=doc.output('datauristring');
      const w=window.open('','_blank');
      if(w){
        w.document.write('<html><head><title>'+nomeArq+'</title></head><body style="margin:0"><iframe src="'+dataUri+'" style="border:none;width:100%;height:100vh"></iframe></body></html>');
        w.document.close();
        toast('✅ PDF aberto em nova aba!',3000);
      }else{
        // [FIX-v71-BTOA] btoa() falha com chars não-Latin1 (ex: nomes com acentos fora do range)
        // Substitui por URL.createObjectURL(blob) que é sempre seguro para conteúdo binário
        try{
          const _blobFb=doc.output('blob');
          const _urlFb=URL.createObjectURL(_blobFb);
          const link=document.createElement('a');
          link.href=_urlFb;link.download=nomeArq;link.style.display='none';
          document.body.appendChild(link);link.click();
          setTimeout(()=>{URL.revokeObjectURL(_urlFb);document.body.removeChild(link);},3000);
        }catch{
          // último recurso: datauristring já foi gerado acima, tenta novamente
          const link=document.createElement('a');
          link.href=doc.output('datauristring');link.download=nomeArq;link.click();
        }
        toast('✅ PDF gerado!',3000);
      }
    }catch(fallbackErr){
      throw fallbackErr;
    }
  }
}

/* init */
async function init(){
  const p=new URLSearchParams(window.location.search);
  const cnpjUrl=normCnpj(p.get('cnpj')||p.get('portal')||'');
  const senhaUrl=p.get('s')||null; // [FIX-portal-v78-AUTOLOGIN] Lê senha da URL para auto-login
  // Try restore session
  const sess=restaurarSessao();
  if(sess&&!cnpjUrl){
    // Show skeleton while verifying
    el().innerHTML=`<div class="skel-card skeleton anim-1"></div><div class="skel-header skeleton anim-2" style="height:38px;border-radius:999px;margin-bottom:14px;"></div><div class="skel-card skeleton anim-2"></div><div class="skel-card skeleton anim-3"></div>`;
    if(!await garantirAuth()){renderLogin({cnpj:sess.cnpj});return;}
    // Quick check session still valid in Firestore
    try{
      const snap=await Promise.race([db.collection('onlineEsPortalClientes').doc(sess.cnpj).get(),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),8000))]);
      if(snap.exists&&snap.data().ativo!==false){
        const cred=snap.data();
        const agora=new Date(),expira=cred.expiradoEm?new Date(cred.expiradoEm):new Date(0);
        // [FIX-v73-SESS-RESTORE-HASH] Sanitiza cred na restauração — mesmo tratamento do login normal
        const credSafeRestore={expiradoEm:cred.expiradoEm,ativo:cred.ativo,nome:cred.nome,emails:cred.emails,whatsapps:cred.whatsapps};
        if(agora<=expira){sessao={cnpj:sess.cnpj,nome:cred.nome||sess.cnpj,cred:credSafeRestore};salvarSessao(sessao);renderLista();return;}
      }
    }catch{}
    limparSessao();
  }
  // [FIX-portal-v78-AUTOLOGIN] Se veio com ?s=SENHA na URL, faz auto-login direto
  if(cnpjUrl && senhaUrl && /^\d{6}$/.test(senhaUrl)){
    // Remove ?s= da URL antes de exibir (senha não deve ficar no histórico)
    try{
      const _cleanUrl=window.location.href.split('?')[0]+'?cnpj='+cnpjUrl;
      window.history.replaceState({},'',_cleanUrl);
    }catch{}
    // Mostra tela de login com feedback de carregamento
    renderLogin({cnpj:cnpjUrl});
    // Preenche senha e dispara login automaticamente
    setTimeout(async function(){
      const _inp=document.getElementById('inputSenha');
      const _btn=document.getElementById('btnEntrar');
      const _errEl=document.getElementById('erroLogin');
      if(!_inp||!_btn) return;
      _inp.value=senhaUrl;
      _btn.disabled=true;
      _btn.innerHTML='<i class="ri-loader-4-line spin"></i> Entrando...';
      try{
        const res=await fazerLogin(cnpjUrl, senhaUrl);
        if(res.ok){
          try{sessionStorage.setItem('onlinees_ultimo_cnpj',cnpjUrl);}catch{}
          document.title='Meus Relatórios — Portal ONLINE-ES';
          renderLista();
        } else if(res.expirada){
          renderExpirada(res.cnpj,res.cred);
        } else {
          if(_errEl){_errEl.textContent=res.msg;_errEl.style.display='block';}
          _btn.disabled=false;
          _btn.innerHTML='<i class="ri-login-circle-line"></i> Entrar';
        }
      }catch(e){
        if(_errEl){_errEl.textContent='Erro ao entrar. Tente novamente.';_errEl.style.display='block';}
        _btn.disabled=false;
        _btn.innerHTML='<i class="ri-login-circle-line"></i> Entrar';
      }
    }, 600);
  } else {
    renderLogin({cnpj:cnpjUrl});
  }
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();

// [FIX-v77-HISTORY] Intercepta botão Voltar do Android/browser
// e.state = estado que estamos INDO (destino após pop), não de onde viemos.
// Stack: [null] → pushState(lista) → pushState(detalhe)
// Back de detalhe: e.state={portal:'lista'} → renderLista  ✓
// Back de lista:   e.state=null            → renderLogin   ✓
window.addEventListener('popstate',function(e){
  const state=e.state;
  if(state&&state.portal==='lista'){
    // Indo para o estado lista → mostra lista de RATs
    if(sessao){renderLista();}else{renderLogin();}
  }else if(state&&state.portal==='detalhe'){
    // Indo para detalhe via popstate (improvável, mas seguro) → mostra lista
    if(sessao){renderLista();}else{renderLogin();}
  }else{
    // Estado nulo/desconhecido — antes do primeiro pushState → vai para login
    renderLogin({cnpj:sessao?sessao.cnpj:''});
  }
});
})();
