<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portal do Cliente — ONLINE-ES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #f97316;
      --blue:   #114f91;
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --text:   #0f172a;
      --muted:  #64748b;
      --border: rgba(148,163,184,.2);
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    html, body {
      min-height: 100vh; background: var(--bg);
      font-family: 'Poppins', system-ui, sans-serif;
      color: var(--text); font-size: 15px; overflow-x: hidden;
    }
    /* Topbar */
    .topbar {
      background: #0f172a; padding: 11px 20px;
      display: flex; align-items: center; gap: 11px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo {
      width: 38px; height: 38px; border-radius: 9px;
      background: #1e293b; border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .topbar-logo img { width: 38px; height: 38px; object-fit: contain; display: block; }
    .logo-fb {
      font-size: .58rem; font-weight: 800; color: var(--accent);
      letter-spacing: -.03em; text-align: center; line-height: 1.1;
      display: none; width: 100%;
    }
    .topbar-title { color: #f1f5f9; font-weight: 700; font-size: .93rem; line-height: 1.2; }
    .topbar-sub   { color: #94a3b8; font-size: .7rem; }
    /* Wrap */
    .wrap { max-width: 680px; margin: 0 auto; padding: 28px 16px 60px; }
    /* Card */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 22px;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h2 i { color: var(--accent); font-size: 1.15rem; }
    /* Form */
    label {
      display: block; font-size: .72rem; font-weight: 600;
      color: var(--muted); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    input[type=text], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 16px; font-family: inherit; color: var(--text);
      background: #f8fafc; outline: none;
      transition: border-color .2s, box-shadow .2s; margin-bottom: 14px;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(17,79,145,.1);
      background: #fff;
    }
    /* Botões */
    .btn {
      width: 100%; padding: 13px; background: var(--blue); color: #fff;
      border: none; border-radius: 12px; font-size: .95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, transform .1s; margin-top: 4px;
    }
    .btn:hover   { background: #1a5ea8; }
    .btn:active  { transform: scale(.98); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-sec {
      width: 100%; padding: 10px; background: transparent;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      font-family: inherit; cursor: pointer; margin-top: 10px;
      transition: border-color .15s, color .15s;
    }
    .btn-sec:hover { border-color: var(--blue); color: var(--blue); }
    /* Mensagens */
    .erro {
      background: #fff1f2; border: 1px solid #fecaca; border-radius: 10px;
      color: #dc2626; font-size: .82rem; padding: 10px 14px;
      margin-bottom: 14px; display: none; line-height: 1.5;
    }
    .info-box {
      background: rgba(249,115,22,.07); border: 1px solid rgba(249,115,22,.25);
      border-radius: 10px; color: #9a3412; font-size: .82rem;
      padding: 10px 14px; margin-bottom: 14px; line-height: 1.5;
    }
    .dica {
      background: rgba(17,79,145,.06); border: 1px solid rgba(17,79,145,.18);
      border-radius: 10px; color: var(--blue); font-size: .78rem;
      padding: 9px 13px; margin-bottom: 14px; line-height: 1.5;
    }
    /* Session bar */
    .session-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .session-info { font-size: .8rem; color: var(--muted); }
    .session-info strong { color: var(--text); }
    .btn-logout {
      padding: 7px 14px; background: transparent;
      border: 1.5px solid var(--border); border-radius: 999px;
      font-size: .75rem; font-weight: 600; color: var(--muted);
      font-family: inherit; cursor: pointer; display: flex;
      align-items: center; gap: 5px;
      transition: border-color .15s, color .15s;
    }
    .btn-logout:hover { border-color: #dc2626; color: #dc2626; }
    /* RAT cards */
    .rat-card {
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      padding: 15px 16px; margin-bottom: 10px; cursor: pointer;
      transition: box-shadow .18s, border-color .18s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .rat-card:hover  { box-shadow: 0 6px 20px rgba(249,115,22,.12); border-color: rgba(249,115,22,.35); transform: translateY(-1px); }
    .rat-card:active { transform: scale(.99); }
    .rat-card-top    { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .rat-numero      { font-weight: 700; font-size: .9rem; color: var(--text); }
    .rat-data, .rat-tec { font-size: .72rem; color: var(--muted); margin-top: 3px; }
    .badge {
      font-size: .63rem; font-weight: 700; padding: 3px 10px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-ok   { background: #f0fdf4; color: #16a34a; }
    .badge-warn { background: #fffbeb; color: #d97706; }
    .badge-bad  { background: #fff1f2; color: #dc2626; }
    /* Detalhe */
    .detalhe-header {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .btn-back {
      padding: 8px 14px; background: #f1f5f9; border: 1px solid var(--border);
      border-radius: 10px; font-size: .8rem; font-weight: 600;
      color: var(--muted); font-family: inherit; cursor: pointer;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: #e2e8f0; }
    .detalhe-title  { font-size: .98rem; font-weight: 700; color: var(--text); }
    .campo          { margin-bottom: 12px; }
    .campo-label    { font-size: .67rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .campo-valor    { font-size: .88rem; color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .divider        { border: none; border-top: 1px dashed var(--border); margin: 14px 0; }
    .btn-pdf {
      background: #0f172a; color: #bfdbfe; border: 1px solid #1e40af;
      border-radius: 12px; padding: 12px 20px; font-size: .88rem; font-weight: 700;
      font-family: inherit; cursor: pointer; display: flex; align-items: center;
      gap: 8px; width: 100%; justify-content: center;
      transition: background .15s; margin-top: 8px;
    }
    .btn-pdf:hover    { background: #1e293b; }
    .btn-pdf:disabled { opacity: .6; cursor: not-allowed; }
    /* Loading */
    .loading { text-align: center; color: var(--muted); padding: 40px 0; font-size: .88rem; }
    .loading i { font-size: 2rem; display: block; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; display: inline-block; }
    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: #0f172a; color: #fff; padding: 10px 20px;
      border-radius: 12px; font-size: .82rem; font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,.25); z-index: 9999;
      transition: transform .25s ease; white-space: nowrap;
      max-width: 88vw; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    /* Footer */
    .footer { text-align: center; font-size: .7rem; color: var(--muted); margin-top: 20px; }
    @media (max-width: 520px) {
      .wrap { padding: 16px 10px 56px; }
      .card { padding: 18px 14px; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <img id="topbarLogo"
         src="https://www.onlinees.com.br/logo.png"
         alt="ONLINE-ES"
         onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex';">
    <div class="logo-fb" id="logoFb" style="display:none;align-items:center;justify-content:center;width:100%;height:100%;flex-direction:column;">ON<br>LINE</div>
  </div>
  <div>
    <div class="topbar-title">ONLINE-ES Eletroeletrônica</div>
    <div class="topbar-sub">Portal do Cliente</div>
  </div>
</div>

<div class="wrap">
  <div id="conteudo">
    <div class="loading"><i class="ri-loader-4-line spin"></i> Carregando...</div>
  </div>
  <div class="footer">ONLINE-ES Eletroeletrônica &middot; www.onlinees.com.br</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
'use strict';

/* ── Firebase ── */
firebase.initializeApp({
  apiKey:            "AIzaSyBY8hMISkkDIn_-5immIdqFtp4qgqZHwf8",
  authDomain:        "onlinees-system.firebaseapp.com",
  projectId:         "onlinees-system",
  storageBucket:     "onlinees-system.appspot.com",
  messagingSenderId: "891796507607",
  appId:             "1:891796507607:web:b5f7e9aab2975beca81992"
});
const db   = firebase.firestore();
const auth = firebase.auth();

/* ── Helpers ── */
const normCnpj = v => String(v||'').replace(/\D/g,'');

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function gerarSenha6(){
  const arr = new Uint8Array(4);
  crypto.getRandomValues(arr);
  const n = new DataView(arr.buffer).getUint32(0, false);
  return String(100000 + (n % 900000));
}

function dataBR(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch{ return iso; }
}

/* [SEC] Escaping completo — previne XSS em qualquer dado do Firestore */
function esc(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function badge(status){
  const cls = !status ? 'badge-bad' : status==='Concluído' ? 'badge-ok' : status.includes('pendência') ? 'badge-warn' : 'badge-bad';
  return `<span class="badge ${cls}">${esc(status||'Indefinido')}</span>`;
}

function maskCnpj(v){
  v = v.replace(/\D/g,'').slice(0,14);
  if(v.length<=11) return v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

let _toastTimer = null;
function toast(msg, dur=3000){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), dur);
}

const el = ()=>document.getElementById('conteudo');

/* ── [SEC] Rate limit: máx 5 tentativas / 2 min ── */
const _rl = { count:0, resetAt:0 };
function checkRL(){
  const now = Date.now();
  if(now > _rl.resetAt){ _rl.count=0; _rl.resetAt=now+120000; }
  _rl.count++;
  if(_rl.count>5){
    const s = Math.ceil((_rl.resetAt-now)/1000);
    return { bloqueado:true, msg:`Muitas tentativas. Aguarde ${s}s.` };
  }
  return { bloqueado:false };
}
function resetRL(){ _rl.count=0; }

/* ── Auth anônimo ── */
async function garantirAuth(){
  for(let i=0;i<10;i++){
    try{ if(auth.currentUser) return true; await auth.signInAnonymously(); return true; }
    catch{ await new Promise(r=>setTimeout(r,500)); }
  }
  return false;
}

/* ── Sessão ── */
let sessao = null;

/* ── Login ── */
async function fazerLogin(cnpjRaw, senhaRaw){
  const cnpj  = normCnpj(cnpjRaw);
  const senha = String(senhaRaw??'').trim();
  if(cnpj.length<8)  return {ok:false, msg:'CNPJ ou CPF inválido.'};
  if(senha.length<6) return {ok:false, msg:'A senha deve ter 6 dígitos.'};
  const rl = checkRL();
  if(rl.bloqueado) return {ok:false, msg:rl.msg};
  const authOk = await garantirAuth();
  if(!authOk) return {ok:false, msg:'Sem conexão com o servidor. Tente novamente.'};
  let snap;
  try{
    snap = await Promise.race([
      db.collection('onlineEsPortalClientes').doc(cnpj).get(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),12000))
    ]);
  }catch(e){
    if(e.message==='timeout') return {ok:false, msg:'Tempo de resposta excedido. Verifique sua conexão.'};
    if(e.code==='permission-denied') return {ok:false, msg:'Acesso negado. Verifique sua conexão.'};
    return {ok:false, msg:'Erro de conexão. Verifique sua internet.'};
  }
  if(!snap.exists) return {ok:false, msg:'CNPJ/CPF não cadastrado. Solicite o acesso ao técnico.'};
  const cred = snap.data();
  if(cred.ativo===false) return {ok:false, msg:'Acesso desativado. Contate a ONLINE-ES.'};
  const agora  = new Date();
  const expira = cred.expiradoEm ? new Date(cred.expiradoEm) : new Date(0);
  if(agora>expira) return {ok:false, expirada:true, cnpj, cred};
  const hash = await sha256(senha);
  if(hash!==cred.senhaHash) return {ok:false, msg:'Senha incorreta. Use os 6 dígitos enviados pelo técnico.'};
  resetRL();
  sessao = {cnpj, nome:cred.nome||cnpj, cred};
  try{ db.collection('onlineEsPortalClientes').doc(cnpj).update({ultimoAcesso:agora.toISOString()}); }catch{}
  return {ok:true};
}

/* ── Buscar RATs com timeout ── */
async function buscarRats(cnpj){
  const TO = ms=>new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms));
  try{
    let snap;
    try{
      snap = await Promise.race([
        db.collection('onlineEsRelatorios').where('cnpjCliente','==',cnpj).where('_deleted','==',false).orderBy('dataHoraIso','desc').limit(50).get(),
        TO(15000)
      ]);
    }catch(e){
      if(e.message==='timeout') throw e;
      snap = await Promise.race([
        db.collection('onlineEsRelatorios').where('cnpjCliente','==',cnpj).limit(80).get(),
        TO(15000)
      ]);
    }
    const arr=[];
    snap.forEach(d=>{const r=d.data();r._id=d.id;if(!r._deleted)arr.push(r);});
    arr.sort((a,b)=>(b.dataHoraIso||'').localeCompare(a.dataHoraIso||''));
    return arr.slice(0,50);
  }catch(e){ console.warn('[Portal] buscarRats:',e.message); return null; }
}

/* ── Render: Login ── */
function renderLogin(opts={}){
  el().innerHTML=`
    <div class="card">
      <h2><i class="ri-shield-keyhole-line"></i> Acesso ao Portal</h2>
      ${opts.info?`<div class="info-box">${opts.info}</div>`:''}
      <div id="erroLogin" class="erro"></div>
      <label>CNPJ ou CPF da empresa</label>
      <input id="inputCnpj" type="text" inputmode="numeric"
        placeholder="00.000.000/0001-00 ou 000.000.000-00"
        autocomplete="username" value="${esc(opts.cnpj||'')}">
      <label>Senha (6 dígitos)</label>
      ${opts.cnpj?`<div class="dica"><i class="ri-key-line"></i> <strong>Digite a senha de 6 dígitos</strong> recebida no WhatsApp ou e-mail do técnico.</div>`:''}
      <input id="inputSenha" type="password" inputmode="numeric"
        maxlength="6" placeholder="• • • • • •" autocomplete="current-password">
      <button class="btn" id="btnEntrar"><i class="ri-login-box-line"></i> Entrar</button>
      <button class="btn-sec" id="btnEsqueci">Esqueci minha senha</button>
    </div>
    <div class="card" style="border-style:dashed;background:#f8fafc;">
      <div style="font-size:.77rem;color:#64748b;line-height:1.75;">
        <strong style="color:#0f172a;font-size:.8rem;"><i class="ri-information-line" style="color:var(--blue)"></i> Como acessar:</strong><br>
        ① O técnico envia a senha após o atendimento<br>
        ② Digite o CNPJ/CPF e a senha de 6 dígitos<br>
        ③ Acesse e baixe seus Relatórios Técnicos em PDF<br>
        ④ A senha é válida por 30 dias
      </div>
    </div>`;

  const ci = document.getElementById('inputCnpj');
  ci.addEventListener('input',()=>{ const p=ci.selectionStart; ci.value=maskCnpj(ci.value); try{ci.setSelectionRange(p,p);}catch{} });
  if(opts.cnpj) setTimeout(()=>document.getElementById('inputSenha')?.focus(),250);

  async function tentarLogin(){
    const errEl=document.getElementById('erroLogin');
    const btnEl=document.getElementById('btnEntrar');
    if(!errEl||!btnEl) return;
    errEl.style.display='none';
    btnEl.disabled=true;
    btnEl.innerHTML='<i class="ri-loader-4-line spin"></i> Verificando...';
    const res = await fazerLogin(
      document.getElementById('inputCnpj')?.value||'',
      document.getElementById('inputSenha')?.value||''
    );
    if(res.ok){ renderLista(); }
    else if(res.expirada){ renderExpirada(res.cnpj,res.cred); }
    else{
      if(errEl){errEl.textContent=res.msg;errEl.style.display='block';}
      if(btnEl){btnEl.disabled=false;btnEl.innerHTML='<i class="ri-login-box-line"></i> Entrar';}
    }
  }
  document.getElementById('btnEntrar').addEventListener('click',tentarLogin);
  document.getElementById('inputSenha').addEventListener('keydown',e=>{if(e.key==='Enter')tentarLogin();});
  document.getElementById('btnEsqueci').addEventListener('click',renderEsqueci);
}

/* ── Render: Senha expirada ── */
async function renderExpirada(cnpj, cred){
  el().innerHTML=`
    <div class="card">
      <h2><i class="ri-time-line" style="color:#d97706"></i> Senha expirada</h2>
      <div class="info-box">Sua senha expirou. Selecione como deseja receber uma nova senha.</div>
      <div id="expErr" class="erro"></div>
      <div id="expAcoes"></div>
      <button class="btn-sec" id="btnVoltarExp" style="margin-top:12px;">← Voltar ao login</button>
    </div>`;
  document.getElementById('btnVoltarExp').addEventListener('click',()=>renderLogin({cnpj}));

  const emails    = (cred.emails||[]).filter(Boolean);
  const whatsapps = (cred.whatsapps||[]).filter(Boolean);
  const acoesEl   = document.getElementById('expAcoes');

  if(!emails.length && !whatsapps.length){
    acoesEl.innerHTML='<p style="font-size:.82rem;color:#64748b;">Nenhum contato cadastrado. Entre em contato com a ONLINE-ES.</p>';
    return;
  }

  const portalUrl = window.location.origin + window.location.pathname + '?cnpj=' + cnpj;

  async function renovarSenha(){
    const s    = gerarSenha6();
    const hash = await sha256(s);
    const exp  = new Date(Date.now()+30*86400000).toISOString();
    await db.collection('onlineEsPortalClientes').doc(cnpj).update({senhaHash:hash,expiradoEm:exp,criadaEm:new Date().toISOString()});
    return s;
  }

  emails.forEach(email=>{
    const btn=document.createElement('button');
    btn.className='btn'; btn.style.cssText='background:#0ea5e9;margin-bottom:8px;';
    btn.innerHTML=`<i class="ri-mail-send-line"></i> Enviar nova senha para ${esc(email)}`;
    btn.addEventListener('click',async()=>{
      btn.disabled=true; btn.innerHTML='<i class="ri-loader-4-line spin"></i> Gerando...';
      try{
        const s=await renovarSenha();
        window.open(`mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent('Portal ONLINE-ES — Nova senha')}&body=${encodeURIComponent(`Sua nova senha para o Portal do Cliente ONLINE-ES:\n\n🔗 Acesso: ${portalUrl}\n👤 Usuário (CNPJ/CPF): ${cnpj}\n🔑 Senha: ${s} (válida por 30 dias)\n\nGuarde esta mensagem.`)}`, '_blank');
        toast('✅ E-mail aberto com nova senha!',4000);
        setTimeout(()=>renderLogin({cnpj,info:`✅ Nova senha: <strong style="font-family:monospace;letter-spacing:.1em;">${s}</strong> — use-a para entrar.`}),1500);
      }catch{ btn.disabled=false; btn.innerHTML=`<i class="ri-mail-send-line"></i> Tentar novamente`; }
    });
    acoesEl.appendChild(btn);
  });

  whatsapps.forEach(num=>{
    const btn=document.createElement('button');
    btn.className='btn'; btn.style.cssText='background:#16a34a;margin-bottom:8px;';
    btn.innerHTML=`<i class="ri-whatsapp-line"></i> Receber nova senha via WhatsApp (+${esc(num)})`;
    btn.addEventListener('click',async()=>{
      btn.disabled=true; btn.innerHTML='<i class="ri-loader-4-line spin"></i> Gerando...';
      try{
        const s=await renovarSenha();
        const n=num.length<=11?'55'+num:num;
        window.open(`https://wa.me/${n}?text=${encodeURIComponent(`🔐 *Portal ONLINE-ES — Nova senha*\n\n🔗 Acesse: ${portalUrl}\n👤 Usuário (CNPJ/CPF): ${cnpj}\n🔑 Nova senha: *${s}* (válida por 30 dias)\n\n_Guarde esta mensagem._`)}`, '_blank');
        toast('✅ WhatsApp aberto com nova senha!',4000);
        setTimeout(()=>renderLogin({cnpj,info:`✅ Nova senha: <strong style="font-family:monospace;letter-spacing:.1em;">${s}</strong> — use-a para entrar.`}),1500);
      }catch{ btn.disabled=false; btn.innerHTML=`<i class="ri-whatsapp-line"></i> Tentar novamente`; }
    });
    acoesEl.appendChild(btn);
  });
}

/* ── Render: Esqueci senha ── */

      <h2><i class="ri-key-line"></i> Recuperar acesso</h2>

        Entre em contato com a ONLINE-ES informando seu CNPJ/CPF para receber uma nova senha.
      </p>
      <div style="background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:.82rem;color:#475569;line-height:1.8;">
        <strong style="color:var(--text);">Contato ONLINE-ES:</strong><br>
        📱 WhatsApp: (27) 99XXX-XXXX<br>
        📧 E-mail: contato@onlinees.com.br
      </div>
      <button class="btn-sec" id="btnVoltarEsq" style="margin-top:14px;">← Voltar ao login</button>
    </div>`;
  document.getElementById('btnVoltarEsq').addEventListener('click',()=>renderLogin());

/* ── Render: Lista RATs ── */
async function renderLista(){
  el().innerHTML=`<div class="loading"><i class="ri-loader-4-line spin"></i> Buscando seus relatórios...</div>`;
  const rats = await buscarRats(sessao.cnpj);

  if(rats===null){
    el().innerHTML=`
      <div class="card" style="text-align:center;padding:32px;">
        <i class="ri-wifi-off-line" style="font-size:2.2rem;color:#94a3b8;display:block;margin-bottom:10px;"></i>
        <p style="color:#64748b;font-size:.88rem;">Erro ao buscar relatórios. Verifique sua conexão.</p>
        <button class="btn" id="btnRetentar" style="margin-top:16px;max-width:220px;">
          <i class="ri-refresh-line"></i> Tentar novamente
        </button>
      </div>`;
    document.getElementById('btnRetentar').addEventListener('click',renderLista);
    return;
  }

  let html=`
    <div class="session-bar">
      <div class="session-info">
        Olá, <strong>${esc(sessao.nome)}</strong><br>
        <span>${esc(sessao.cnpj)} &middot; ${rats.length} relatório(s)</span>
      </div>
      <button class="btn-logout" id="btnSair"><i class="ri-logout-box-line"></i> Sair</button>
    </div>`;

  if(!rats.length){
    html+=`<div class="card" style="text-align:center;color:#94a3b8;padding:36px;">
      <i class="ri-file-search-line" style="font-size:2.5rem;display:block;margin-bottom:10px;"></i>
      Nenhum relatório encontrado para este CNPJ/CPF.
    </div>`;
  }else{
    rats.forEach((r,i)=>{
      html+=`
        <div class="rat-card" data-idx="${i}">
          <div class="rat-card-top">
            <div>
              <div class="rat-numero">${esc(r.numero||'Sem número')}</div>
              <div class="rat-data"><i class="ri-calendar-line"></i> ${esc(dataBR(r.dataHoraIso||r.dataHora))}</div>
              <div class="rat-tec"><i class="ri-user-line"></i> ${esc(r.tecnico||'—')}</div>
            </div>
            ${badge(r.status)}
          </div>
        </div>`;
    });
  }

  el().innerHTML=html;
  document.getElementById('btnSair')?.addEventListener('click',()=>{sessao=null;renderLogin();});
  el().querySelectorAll('.rat-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const i=parseInt(card.getAttribute('data-idx'),10);
      if(!isNaN(i)&&rats[i]) renderDetalhe(rats[i]);
    });
  });
}

/* ── Render: Detalhe ── */
function renderDetalhe(r){
  const campo=(label,val)=>{
    if(val===null||val===undefined||val==='') return '';
    return `<div class="campo"><div class="campo-label">${label}</div><div class="campo-valor">${esc(String(val))}</div></div>`;
  };

  /* [SEC] Assinatura: só aceita data URI de imagem válida */
  const sigHtml = (r.assinaturaCliente && /^data:image\/(png|jpeg|jpg|gif|webp);base64,/.test(r.assinaturaCliente))
    ? `<hr class="divider">
       <div class="campo-label">Assinatura do cliente</div>
       <img src="${r.assinaturaCliente}" style="max-width:200px;border:1px solid var(--border);border-radius:8px;margin-top:6px;display:block;" alt="Assinatura">`
    : '';

  const enderecoFull = [r.endereco,r.bairro,r.cidade,r.uf].filter(Boolean).join(', ');

  el().innerHTML=`
    <div class="detalhe-header">
      <button class="btn-back" id="btnVoltar"><i class="ri-arrow-left-line"></i> Voltar</button>
      <div class="detalhe-title">${esc(r.numero||'Relatório')}</div>
      ${badge(r.status)}
    </div>
    <div class="card">
      <h2><i class="ri-file-text-line"></i> Dados do Atendimento</h2>
      ${campo('Número RAT',    r.numero)}
      ${campo('Data / Hora',   dataBR(r.dataHoraIso||r.dataHora))}
      ${campo('Status',        r.status)}
      ${campo('Técnico',       r.tecnico)}
      <hr class="divider">
      ${campo('Cliente',       r.cliente)}
      ${campo('CNPJ / CPF',   r.cnpjCliente)}
      ${campo('Endereço',      enderecoFull)}
      ${campo('Contato',       r.contato)}
      ${campo('Telefone',      r.telefone)}
      <hr class="divider">
      ${campo('Equipamento',   r.equipamento)}
      ${campo('Nº Série',      r.serie)}
      ${campo('Problema',      r.problema)}
      ${campo('Diagnóstico',   r.diagnostico)}
      ${campo('Serviço realizado', r.servico||r.acoes)}
      ${campo('Observações',   r.observacoes)}
      ${sigHtml}
      <button class="btn-pdf" id="btnPdf"><i class="ri-file-pdf-line"></i> Baixar PDF</button>
    </div>`;

  document.getElementById('btnVoltar').addEventListener('click',renderLista);
  document.getElementById('btnPdf').addEventListener('click',async()=>{
    const btn=document.getElementById('btnPdf');
    if(!btn) return;
    btn.disabled=true; btn.innerHTML='<i class="ri-loader-4-line spin"></i> Gerando PDF...';
    try{ await gerarPDF(r); }
    catch(e){ toast('❌ Erro ao gerar PDF.',4000); console.warn('[Portal] PDF:',e.message||e); }
    finally{ if(document.getElementById('btnPdf')){ btn.disabled=false; btn.innerHTML='<i class="ri-file-pdf-line"></i> Baixar PDF'; } }
  });
}

/* ── Gerar PDF ── */
async function gerarPDF(r){
  if(!window.jspdf?.jsPDF) throw new Error('jsPDF não carregado');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210, M=14; let y=20;

  function L(txt,size=10,bold=false,rgb=[30,30,30]){
    doc.setFontSize(size); doc.setFont('helvetica',bold?'bold':'normal'); doc.setTextColor(...rgb);
    const lines=doc.splitTextToSize(String(txt??''),W-M*2);
    for(const l of lines){ if(y>275){doc.addPage();y=20;} doc.text(l,M,y); y+=size*0.42; }
  }
  function C(label,val){ if(!val) return; L(label,8,true,[100,100,100]); y+=1; L(String(val),10); y+=3; }
  function HR(){ doc.setDrawColor(210,210,210); doc.line(M,y,W-M,y); y+=5; }

  L('ONLINE-ES Eletroeletrônica',14,true,[17,79,145]); y+=2;
  L('Relatório Técnico de Atendimento',11,false,[100,100,100]); y+=6; HR();
  L('Dados do Atendimento',11,true); y+=3;
  C('Número RAT',r.numero); C('Data / Hora',dataBR(r.dataHoraIso||r.dataHora));
  C('Status',r.status); C('Técnico',r.tecnico); HR();
  L('Dados do Cliente',11,true); y+=3;
  C('Cliente',r.cliente); C('CNPJ / CPF',r.cnpjCliente);
  C('Endereço',[r.endereco,r.bairro,r.cidade,r.uf].filter(Boolean).join(', '));
  C('Contato',r.contato); C('Telefone',r.telefone); HR();
  L('Dados Técnicos',11,true); y+=3;
  C('Equipamento',r.equipamento); C('Nº Série',r.serie);
  C('Problema',r.problema); C('Diagnóstico',r.diagnostico);
  C('Serviço realizado',r.servico||r.acoes); C('Observações',r.observacoes);

  if(r.assinaturaCliente && /^data:image\/(png|jpeg|jpg);base64,/.test(r.assinaturaCliente)){
    HR(); L('Assinatura do Cliente',11,true); y+=3;
    try{ doc.addImage(r.assinaturaCliente,'PNG',M,y,60,25); y+=30; }catch{}
  }

  const total=doc.getNumberOfPages();
  for(let p=1;p<=total;p++){
    doc.setPage(p); doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text(`ONLINE-ES Eletroeletrônica — Pág. ${p}/${total}`,M,290);
  }

  doc.save(`RAT-${(r.numero||r._id||'relatorio').replace(/[^a-zA-Z0-9\-_]/g,'_')}.pdf`);
  toast('✅ PDF baixado!',3000);
}

/* ── Init ── */
function init(){
  const p=new URLSearchParams(window.location.search);
  const cnpjUrl=p.get('cnpj')||p.get('portal')||'';
  renderLogin({cnpj:normCnpj(cnpjUrl)});
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
